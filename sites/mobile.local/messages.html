<!doctype html>
<html lang="en">
<head>
<script>window.RelRoot = "../";</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages - Nebula Mobile</title>
<link rel="stylesheet" href="../static/skin.css">
<link rel="stylesheet" href="../static/components.css">
</head>
<body class="page">
<div class="navbar">
  <div class="inner">
    <div class="brand">📱 Nebula Mobile</div>
    <div class="navlinks">
      <a href="index.html">Plans</a>
      <a href="messages.html" class="active">Messages</a>
      <a href="account.html">My Account</a>
    </div>
  </div>
</div>

<div class="container" style="max-width:600px">
  <h1>Your Messages</h1>
  <div id="messages-list" class="grid" style="display:flex; flex-direction:column; gap:16px">
    <div class="loading">Loading messages...</div>
  </div>
</div>

<script src="../static/common.js"></script>
<script src="../static/components.js"></script>
<script>
async function loadMessages() {
  const list = document.getElementById('messages-list');
  try {
    const res = await fetch('../api/messages');
    const data = await res.json();
    
    if (!data.messages || data.messages.length === 0) {
      list.innerHTML = '<div class="card soft" style="text-align:center; padding:40px; color:var(--muted)">No messages yet.</div>';
      return;
    }

    list.innerHTML = data.messages.map(m => `
      <div class="card soft" style="border-left: 4px solid var(--pri); cursor:pointer">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px">
          <span style="font-weight:bold; color:var(--pri); font-size:16px">${m.sender}</span>
          <span style="font-size:12px; color:var(--muted)">${new Date(m.timestamp).toLocaleString()}</span>
        </div>
        <div style="font-size:15px; line-height:1.5">${m.content}</div>
      </div>
    `).join('');
  } catch (e) {
    list.innerHTML = '<div class="error">Failed to load messages.</div>';
  }
}
document.addEventListener('DOMContentLoaded', loadMessages);
</script>
</body>
</html>
