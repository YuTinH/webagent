<!doctype html>
<html lang="en">
<head>
  <script>window.RelRoot = "../";</script>
  <meta charset="utf-8">
  <title>Setup Utilities - Nebula Energy</title>
  <link rel="stylesheet" href="../static/skin.css">
  <link rel="stylesheet" href="../static/components.css">
</head>
<body class="page">
<div class="navbar">
  <div class="inner"><div class="brand">⚡ Nebula Energy</div></div>
</div>
<div class="container">
  <h1>Set Up Your Utilities</h1>
  <div class="card soft">
    <div class="form">
      <div class="form-group">
        <label>Service Address</label>
        <input type="text" id="address" class="input" placeholder="123 Main St...">
      </div>
      <div class="form-group">
        <label>Bank Account for Billing</label>
        <input type="text" id="account-number" class="input" placeholder="UTIL-XXXXXX">
      </div>
      <div class="form-group">
        <label>Billing Provider</label>
        <select id="payee" class="input">
          <option value="Electricity Dept">Electricity Dept</option>
          <option value="City Utilities">City Utilities</option>
        </select>
      </div>
      <div class="form-group">
        <label>Monthly Billing Cap</label>
        <input type="number" id="monthly-cap" class="input" value="200">
      </div>
      <button id="submit-btn" class="btn pri lg" onclick="submitSetup()">Confirm & Setup</button>
    </div>
  </div>
</div>
<script src="../static/common.js"></script>
<script src="../static/components.js"></script>
<script>
const utilityTaskParams = new URLSearchParams(window.location.search);
const requestedUtilityTaskId = utilityTaskParams.get('task') || 'A3-2025-UTIL';
const utilityTaskId = resolveTaskId(requestedUtilityTaskId);

async function submitSetup() {
  const addr = document.getElementById('address').value;
  const acc = document.getElementById('account-number').value;
  if(!addr || !acc) return Toast.error("Missing info");
  
  await send(utilityTaskId, 'setup_autopay', {
    payee: document.getElementById('payee').value,
    account_number: acc,
    amount: document.getElementById('monthly-cap').value
  });
  Toast.success("Utilities Connected!");
  const target = new URL('index.html', window.location.href);
  target.searchParams.set('success', 'true');
  target.searchParams.set('task', utilityTaskId);
  setTimeout(() => location.href = target.toString(), 800);
}
</script>
</body>
</html>
