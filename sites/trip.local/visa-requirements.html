<!doctype html>
<html lang="en">
<head>
<script>window.RelRoot = "../";</script>
  <meta charset="utf-8">
  <title>trip.local - </title>
  <link rel="stylesheet" href="../static/skin.css">
  <link rel="stylesheet" href="../static/components.css">
  <script src="../static/common.js"></script>
  <script src="../static/components.js"></script>
</head>
<body class="page">
  <div class="navbar">
    <div class="inner">
      <div class="brand">✈️ Trip.local</div>
      <div class="navlinks">
        <a href="../trip.local/flights.html">Flights</a>
        <a href="../trip.local/hotels.html">Hotels</a>
        <a href="../trip.local/commute.html">Commute</a>
        <a href="../trip.local/transport-card.html">Transport Card</a>
        <a href="../trip.local/visa-requirements.html" class="active">Visa Rules</a>
      </div>
    </div>
  </div>
  
  <div class="container" style="max-width:800px">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px">
      <h1>Visa Requirements</h1>
    </div>

    <div class="card soft" style="margin-bottom:24px">
        <h2>Search Visa Rules</h2>
        <div class="form">
            <label for="destination-country">Destination Country</label>
            <select id="destination-country" class="input">
                <option value="">Select a destination</option>
                <option value="Japan">Japan</option>
                <option value="France">France</option>
                <option value="USA">United States</option>
                <option value="UK">United Kingdom</option>
                <option value="Singapore">Singapore</option>
                <option value="Thailand">Thailand</option>
                <option value="Vietnam">Vietnam</option>
                <option value="UAE">UAE</option>
            </select>
            <label for="passport-country">Passport Country</label>
            <select id="passport-country" class="input">
                <option value="">Select a passport country</option>
                <option value="China">China</option>
                <option value="Singapore">Singapore</option>
                <option value="Thailand">Thailand</option>
                <option value="Vietnam">Vietnam</option>
                <option value="Japan">Japan</option>
                <option value="Malaysia">Malaysia</option>
                <option value="Philippines">Philippines</option>
                <option value="South Korea">South Korea</option>
            </select>
            <div style="font-size:13px; color:var(--muted)">
              Search the destination and passport combination you want to inspect.
            </div>
            <button class="btn pri" id="search-btn" style="margin-top:24px; width:100%" onclick="searchVisa()">Search Visa Rules</button>
        </div>
    </div>

    <h2>Visa Search Result</h2>
    <div id="visa-result" style="display:flex; flex-direction:column; gap:16px">
      <!-- Results loaded here -->
      <div class="card soft" style="text-align:center; padding:24px">
        <div style="color:var(--muted)">Run a search to inspect the latest visa rule summary.</div>
      </div>
    </div>
  </div>

  <script>
  const visaParams = new URLSearchParams(window.location.search);
  const visaTaskId = resolveTaskId(visaParams.get('task') || 'E10-2025-VISA');

  async function searchVisa() {
    const destination = document.getElementById('destination-country').value;
    const passport = document.getElementById('passport-country').value;
    if (!destination || !passport) {
      Toast.error('Select both the destination and passport country.');
      return;
    }
    
    await send(visaTaskId, 'search_visa_requirements', {
      destination_country: destination,
      passport_country: passport
    });

    // Manually trigger reload of results
    setTimeout(loadVisaResults, 500);
  }

  async function loadVisaResults() {
    const list = document.getElementById('visa-result');
    list.innerHTML = '<div class="loading">Loading......</div>';

    try {
      const env = await loadEnv();
      const result = env.visa?.last_search_result;

      if (!result) {
        list.innerHTML = `
          <div class="card soft" style="text-align:center; padding:24px">
            <div style="color:var(--muted)">No visa search has been submitted yet.</div>
          </div>
        `;
        return;
      }

      list.innerHTML = `
        <div class="card soft">
          <div style="margin-bottom:16px">
            <h3 style="margin:0 0 4px 0">${result.destination_cn} (${result.destination})</h3>
            <div style="color:var(--muted); font-size:14px">Details: ${result.passport_cn}</div>
          </div>
          
          <div style="background:rgba(0,0,0,0.03); padding:16px; border-radius:8px; margin-bottom:16px">
            <div style="margin-bottom:8px"><strong>Visa Type:</strong> ${result.visa_type}</div>
            <div style="margin-bottom:8px"><strong>Stay Duration:</strong> ${result.stay_duration}</div>
            <div style="margin-bottom:8px"><strong>Required Documents:</strong></div>
            <ul style="margin:0; padding-left:20px; font-size:14px; color:var(--text)">
                ${result.documents.map(d => `<li>${d}</li>`).join('')}
            </ul>
          </div>
          
          <p>${result.notes || ''}</p>
        </div>
      `;
      
    } catch (e) {
      console.error(e);
      list.innerHTML = '<div class="error">Load failed</div>';
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    loadVisaResults();
  });
  </script>
