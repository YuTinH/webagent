<!doctype html>
<html lang="en">
<head>
<script>window.RelRoot = "../";</script>
<meta charset="utf-8">
<title> - Nebula</title>
<link rel="stylesheet" href="../static/skin.css">
<link rel="stylesheet" href="../static/components.css">
</head>
<body>
<div class="navbar">
  <div class="inner">
    <div class="brand"><div class="logo"></div> Nebula</div>
    <div class="navlinks">
      <a href="../trip.local/dashboard.html">Home</a>
      <a href="../trip.local/flights.html">Information</a>
      <a href="../trip.local/hotels.html">Information</a>
      <a href="../trip.local/manage.html" class="active">Information</a>
    </div>
    <div style="margin-left:auto">
      <button id="user-menu-btn" style="background:none; border:none; color:var(--text); font-size:20px; cursor:pointer">
        👤
      </button>
    </div>
  </div>
</div>

<div class="container">
  <h1 style="font-size:28px; font-weight:700; margin:24px 0">Information</h1>
  
  <div id="trips-list">
    <div class="card p-8 text-center muted">Loading......</div>
  </div>
</div>

<script src="../static/common.js"></script>
<script src="../static/components.js"></script>
<script>
async function loadTrips() {
  const container = document.getElementById('trips-list');
  try {
    const env = await loadEnv();
    const flight = env.trips?.flight;
    const hotel = env.trips?.hotel;
    
    let content = '';

    if (flight && flight.pnr) {
      content += `
        <div class="card p-6 mb-4">
          <div class="flex justify-between items-center mb-4">
            <div>
              <div class="text-xl font-bold">Information</div>
              <div class="text-sm muted">PNR: ${flight.pnr}</div>
            </div>
            <div class="badge ok">Confirm</div>
          </div>
          <div class="flex gap-8">
            <div>
              <div class="text-sm muted">Information</div>
              <div class="font-bold">${flight.destination}</div>
            </div>
            <div>
              <div class="text-sm muted">Date</div>
              <div class="font-bold">${flight.date}</div>
            </div>
            <div>
              <div class="text-sm muted">Price</div>
              <div class="font-bold">¥${flight.price}</div>
            </div>
          </div>
        </div>
      `;
    }

    if (hotel && hotel.id) {
      content += `
        <div class="card p-6 mb-4">
          <div class="flex justify-between items-center mb-4">
            <div>
              <div class="text-xl font-bold">Information</div>
              <div class="text-sm muted">ID: ${hotel.id}</div>
            </div>
            <div class="badge ok">Confirm</div>
          </div>
          <div class="flex gap-8">
            <div>
              <div class="text-sm muted">Information</div>
              <div class="font-bold">${hotel.city}</div>
            </div>
            <div>
              <div class="text-sm muted">Date</div>
              <div class="font-bold">${hotel.checkin}</div>
            </div>
            <div>
              <div class="text-sm muted">Information</div>
              <div class="font-bold">${hotel.nights}</div>
            </div>
          </div>
        </div>
      `;
    }

    if (content) {
      container.innerHTML = content;
    } else {
      container.innerHTML = '<div class="card p-8 text-center muted">Information</div>';
    }

  } catch (e) {
    console.error('Failed to load trips:', e);
    container.innerHTML = '<div class="card p-8 text-center err">Load failed</div>';
  }
}

document.addEventListener('DOMContentLoaded', loadTrips);
</script>
