<!doctype html>
<html lang="en">
<head>
<script>window.RelRoot = "../";</script>
  <meta charset="utf-8">
  <title>trip.local - </title>
  <link rel="stylesheet" href="../static/skin.css">
  <link rel="stylesheet" href="../static/components.css">
  <script src="../static/common.js"></script>
  <script src="../static/components.js"></script>
</head>
<body class="page">
  <div class="navbar">
    <div class="inner">
      <div class="brand">✈️ Trip.local</div>
      <div class="navlinks">
        <a href="../trip.local/flights.html">Flights</a>
        <a href="../trip.local/hotels.html">Hotels</a>
        <a href="../trip.local/commute.html" class="active">Commute Route</a>
      </div>
    </div>
  </div>
  
  <div class="container" style="max-width:800px">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px">
      <h1>Find Commute Route</h1>
    </div>

    <div class="card soft" style="margin-bottom:24px">
        <h2>Route Search</h2>
        <div class="form">
            <label>Origin</label>
            <input id="origin" class="input" placeholder="e.g. Pudong Airport, Lujiazui">
            <label>Destination</label>
            <input id="destination" class="input" placeholder="e.g. Jing'an Temple, HKRI Taikoo Hui">
            <label>Departure Time (default 08:00)</label>
            <input id="commute-time" type="time" class="input">
            <label>Transport Mode</label>
            <select id="transport-mode" class="input">
                <option value="all">All Modes</option>
                <option value="bus">Bus</option>
                <option value="subway">Subway</option>
                <option value="bike">Bike</option>
                <option value="car_hailing">Car Hailing</option>
            </select>
            <button id="search-route-btn" class="btn pri" style="margin-top:24px; width:100%" onclick="searchCommute()">Search Commute Route</button>
        </div>
    </div>

    <h2>Route Results</h2>
    <div id="results-list" style="display:flex; flex-direction:column; gap:16px">
      <!-- Results loaded here -->
      <div class="card soft" style="text-align:center; padding:24px">
        <div style="color:var(--muted)">Search for a route to see commute options.</div>
      </div>
    </div>
  </div>

  <script>
  const commuteTaskId = resolveTaskId(new URLSearchParams(window.location.search).get('task') || 'E8-2025-COMMUTE');
  async function searchCommute() {
    const origin = document.getElementById('origin').value;
    const destination = document.getElementById('destination').value;
    const commuteTime = document.getElementById('commute-time').value;
    const transportMode = document.getElementById('transport-mode').value;

    if (!origin || !destination) {
      Toast.error("Enter both origin and destination.");
      return;
    }
    
    await send(commuteTaskId, 'search_commute_route', {
      origin: origin,
      destination: destination,
      commute_time: commuteTime,
      transport_mode: transportMode
    });

    // For now, manually simulate results after submission
    setTimeout(loadCommuteResults, 500);
  }

  async function loadCommuteResults() {
    const list = document.getElementById('results-list');
    list.innerHTML = '<div class="loading">Loading......</div>';

    try {
      const env = await loadEnv();
      const results = env.commute?.search_results || {};

      if (Object.keys(results).length === 0) {
        list.innerHTML = `
          <div class="card soft" style="text-align:center; padding:24px">
            <div style="color:var(--muted)">No routes found for the current search.</div>
          </div>
        `;
        return;
      }

      list.innerHTML = Object.entries(results).map(([id, route]) => `
        <div class="card soft">
          <div style="display:flex; justify-content:space-between; margin-bottom:8px">
            <div>
              <h3 style="margin:0 0 4px 0">${route.transport_mode_cn} (${route.route_name})</h3>
              <div style="color:var(--muted); font-size:14px">Details: ${route.origin} Details: ${route.destination}</div>
            </div>
            <div style="text-align:right">
              <div style="font-weight:600">Details: ${route.duration}</div>
              <div style="color:var(--muted); font-size:13px">Details: ¥${route.cost ? route.cost.toFixed(2) : '0.00'}</div>
            </div>
          </div>
          <p>${route.details || ''}</p>
        </div>
      `).join('');
      
    } catch (e) {
      console.error(e);
      list.innerHTML = '<div class="error">Load failed</div>';
    }
  }

  document.addEventListener('DOMContentLoaded', loadCommuteResults);
  </script>
