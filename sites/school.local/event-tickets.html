<!doctype html>
<html lang="en">
<head>
<script>window.RelRoot = "../";</script>
  <meta charset="utf-8">
  <title>school.local - </title>
  <link rel="stylesheet" href="../static/skin.css">
  <link rel="stylesheet" href="../static/components.css">
  <script src="../static/common.js"></script>
  <script src="../static/components.js"></script>
</head>
<body class="page">
  <div class="navbar">
    <div class="inner">
      <div class="brand">🎓 School.local</div>
      <div class="navlinks">
        <a href="../school.local/my-learning.html">My Learning</a>
        <a href="../school.local/library.html">Library</a>
        <a href="../school.local/event-tickets.html" class="active">Event Tickets</a>
      </div>
    </div>
  </div>
  
  <div class="container" style="max-width:800px">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px">
      <h1>Campus Event Tickets</h1>
    </div>

    <div class="card soft" style="margin-bottom:24px">
        <h2>Available Events</h2>
        <div id="events-list" style="display:grid; grid-template-columns:1fr 1fr; gap:16px">
            <!-- Events loaded here -->
        </div>
    </div>

    <h2>My Tickets</h2>
    <div id="tickets-list" style="display:flex; flex-direction:column; gap:16px">
      <!-- Tickets loaded here -->
      <div class="card soft" style="text-align:center; padding:24px">
        <div style="color:var(--muted)">You have not purchased any tickets yet.</div>
      </div>
    </div>
  </div>

  <script>
  const ticketParams = new URLSearchParams(window.location.search);
  const requestedTicketTaskId = ticketParams.get('task') || 'J3-2025-TICKETS';
  const ticketTaskId = resolveTaskId(requestedTicketTaskId);

  async function load() {
    const eventsList = document.getElementById('events-list');
    const ticketsList = document.getElementById('tickets-list');
    
    try {
      const env = await loadEnv();
      const tickets = env.tickets?.user_tickets || {};
      
      // Mock available events
	      const events = [
	          {id: "EVT-101", name: "Campus Music Fest", date: "2026-05-01", price: 50},
	          {id: "EVT-102", name: "Open Lecture Night", date: "2026-04-15", price: 0},
	          {id: "EVT-103", name: "Outdoor Film Meetup", date: "2026-06-10", price: 30}
	      ];

	      eventsList.innerHTML = events.map((evt, idx) => `
	        <div class="card soft" style="border:1px solid var(--border)">
	          <h3 style="margin:0 0 8px 0">${evt.name}</h3>
	          <div style="color:var(--muted); font-size:14px; margin-bottom:4px">Date: ${evt.date}</div>
	          <div style="font-weight:600; color:var(--pri); margin-bottom:12px">¥${evt.price}</div>
	          <button id="buy-ticket-${evt.id}" class="btn pri" style="width:100%" onclick="buyTicket('${evt.id}', '${evt.name}', ${evt.price})">Buy Ticket</button>
	        </div>
	      `).join('');

      if (Object.keys(tickets).length === 0) {
        ticketsList.innerHTML = `<div class="card soft" style="text-align:center; padding:24px"><div style="color:var(--muted)">No tickets are currently in your account.</div></div>`;
      } else {
        ticketsList.innerHTML = Object.entries(tickets).map(([id, ticket]) => `
          <div class="card soft">
            <div style="display:flex; justify-content:space-between; margin-bottom:16px">
              <div>
                <h3 style="margin:0 0 4px 0">${ticket.event_name} (#${id})</h3>
                <div style="color:var(--muted); font-size:14px">Price: ¥${ticket.price}</div>
              </div>
              <div style="text-align:right">
                <span class="badge ${ticket.status === 'active' ? 'ok' : (ticket.status === 'refunded' ? 'warn' : 'pri')}">${ticket.status}</span>
              </div>
            </div>
            
            <div style="display:flex; gap:8px">
              <button id="transfer-ticket-${id}" class="btn" onclick="transferTicket('${id}')" ${ticket.status !== 'active' ? 'disabled' : ''}>Transfer</button>
              <button id="refund-ticket-${id}" class="btn secondary" onclick="refundTicket('${id}')" ${ticket.status !== 'active' ? 'disabled' : ''}>Refund</button>
            </div>
          </div>
	        `).join('');
	      }
	      
	    } catch (e) {
	      console.error(e);
    }
  }

  function buyTicket(eventId, eventName, price) {
    new Modal({
      title: `Buy Ticket: ${eventName}`,
      content: `Confirm ticket purchase for ¥${price}?`,
      confirmText: 'Confirm',
      onConfirm: async () => {
        await send(ticketTaskId, 'manage_tickets', {
          action_type: 'buy',
          event_id: eventId,
          event_name: eventName,
          price: price
        });
        setTimeout(load, 500);
      }
    }).open();
  }

  function transferTicket(ticketId) {
    new Modal({
      title: 'Transfer Ticket',
      content: `
        <div class="form">
          <label>Recipient Student ID</label>
          <input id="recipient-id" class="input" placeholder="e.g. S987654">
        </div>
      `,
      confirmText: 'Confirm',
      onConfirm: async () => {
        const recipient = document.getElementById('recipient-id').value;
        if (!recipient) {
            Toast.error("Enter the recipient student ID.");
            return;
        }
        await send(ticketTaskId, 'manage_tickets', {
          action_type: 'transfer',
          ticket_id: ticketId,
          recipient_id: recipient
        });
        setTimeout(load, 500);
      }
    }).open();
  }

  function refundTicket(ticketId) {
    new Modal({
      title: 'Refund Ticket',
      content: `Refund ticket #${ticketId}?`,
      confirmText: 'Confirm',
      onConfirm: async () => {
        await send(ticketTaskId, 'manage_tickets', {
          action_type: 'refund',
          ticket_id: ticketId
        });
        setTimeout(load, 500);
      }
    }).open();
  }

  document.addEventListener('DOMContentLoaded', load);
  </script>
