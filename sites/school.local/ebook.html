<!doctype html>
<html lang="en">
<head>
<script>window.RelRoot = "../";</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Details - Nebula</title>
<link rel="stylesheet" href="../static/skin.css">
<link rel="stylesheet" href="../static/components.css">
<style>
.book-details-grid {
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 40px;
}
.book-cover-large {
  width: 100%;
  height: 400px;
  background-color: #334155;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 96px;
  box-shadow: var(--shadow);
}
.book-info-large h1 {
  font-size: 32px;
  margin: 0 0 8px 0;
}
.book-author-large {
  font-size: 18px;
  color: var(--muted);
  margin-bottom: 24px;
}
.book-price-large {
  font-size: 36px;
  font-weight: 700;
  color: var(--pri);
  margin-bottom: 32px;
}
.book-description {
  line-height: 1.8;
  margin-bottom: 32px;
}
</style>
</head>
<body>

<!-- Navigation -->
<div class="navbar">
  <div class="inner">
    <div class="brand"><div class="logo"></div> Nebula</div>
    <div class="navlinks">
      <a href="../school.local/index.html">Home</a>
      <a href="../school.local/catalog.html" class="active">Catalog</a>
      <a href="../school.local/my-learning.html">My Learning</a>
    </div>
  </div>
</div>

<div id="__toast" class="toast"></div>

<!-- Main Container -->
<div class="container">

  <div class="book-details-grid" id="book-content">
    <div class="book-cover-large">📘</div>
    <div class="book-info-large">
      <h1 id="book-title">Loading......</h1>
      <div class="book-author-large" id="book-author"></div>
      <div class="book-price-large">¥<span id="book-price"></span></div>
      <div class="book-description" id="book-description"></div>
      <button class="btn pri lg" id="buy-ebook-btn" onclick="openPurchaseModal()">Buy Ebook</button>
    </div>
  </div>

  <div class="footer">Nebula · Synthetic UI for Web Agent Research</div>
</div>

<!-- JavaScript -->
<script src="../static/common.js"></script>
<script src="../static/components.js"></script>
<script>
let bookId = '';
let bookPrice = 0;
const ebookParams = new URLSearchParams(window.location.search);
const requestedEbookTaskId = ebookParams.get('task') || 'J2-2025-EBOOK';
const ebookTaskId = resolveTaskId(requestedEbookTaskId);

function buildRuntimeBook(id) {
  return {
    title: `Ebook ${id}`,
    author: 'Nebula Press',
    price: 59.99,
    description: 'Review the ebook details before purchasing it from the catalog.'
  };
}

async function loadBookDetails() {
  const urlParams = new URLSearchParams(window.location.search);
  bookId = urlParams.get('id') || 'BK-101';

  const bookMap = {
    'BK-101': { title: 'Web Agent', author: 'Masteryth', price: 49.99, description: 'Web Agent、、。' },
    'BK-102': { title: 'Python数据分析', author: 'Alice', price: 59.99, description: 'Python数据分析实战，覆盖 Pandas、NumPy、Matplotlib。' },
    'BK-103': { title: '', author: 'Bob', price: 69.99, description: 'Error, please try again.，。' }
  };

  const book = bookMap[bookId] || buildRuntimeBook(bookId);
  if (book) {
    document.getElementById('page-title').textContent = `${book.title} - Nebula`;
    document.getElementById('book-title').textContent = book.title;
    document.getElementById('book-author').textContent = `Details: ${book.author}`;
    document.getElementById('book-price').textContent = book.price;
    document.getElementById('book-description').textContent = book.description;
    bookPrice = book.price;
  } else {
    document.getElementById('book-content').innerHTML = '<h1>Information</h1>';
  }
}

function openPurchaseModal() {
  new Modal({
    title: 'Complete Ebook Purchase',
    content: `
      <div class="form">
        <label>Delivery Email</label>
        <input id="ebook-delivery-email" class="input" type="email" placeholder="e.g. reader@example.com">

        <label>License Tier</label>
        <select id="ebook-license-tier" class="input">
          <option value="">Choose a license</option>
          <option value="personal">Personal</option>
          <option value="academic">Academic</option>
          <option value="team">Team</option>
        </select>

        <label>Primary Reading Device</label>
        <select id="ebook-reading-device" class="input">
          <option value="">Choose a device</option>
          <option value="laptop">Laptop</option>
          <option value="tablet">Tablet</option>
          <option value="ereader">E-reader</option>
          <option value="phone">Phone</option>
        </select>

        <label>Purchase Note</label>
        <textarea id="ebook-purchase-note" class="input" rows="2" placeholder="Optional note for your library record"></textarea>
      </div>
    `,
    confirmText: 'Purchase Ebook',
    onConfirm: async () => {
      const deliveryEmail = document.getElementById('ebook-delivery-email').value.trim();
      const licenseTier = document.getElementById('ebook-license-tier').value.trim();
      const readingDevice = document.getElementById('ebook-reading-device').value.trim();
      const purchaseNote = document.getElementById('ebook-purchase-note').value.trim();

      if (!deliveryEmail || !deliveryEmail.includes('@') || !licenseTier || !readingDevice) {
        Toast.error('Enter a delivery email, license tier, and reading device.');
        return false;
      }

      await submitEbookPurchase({
        delivery_email: deliveryEmail,
        license_tier: licenseTier,
        reading_device: readingDevice,
        purchase_note: purchaseNote
      });
      return true;
    }
  }).open();
}

async function submitEbookPurchase(payload) {
  const buyButton = document.getElementById('buy-ebook-btn');
  if (buyButton) {
    buyButton.disabled = true;
    buyButton.textContent = 'Opening My Learning...';
  }
  Toast.info('Processing ebook purchase...');

  try {
    const response = await send(ebookTaskId, 'buy_ebook', {
      bookId: bookId,
      title: document.getElementById('book-title').textContent,
      price: bookPrice,
      ...payload
    });

    if (response && (response.success || response.redirect)) {
      Toast.success('Ebook added to My Learning.');
      window.location.replace(`${window.RelRoot}school.local/my-learning.html?new_book=true&book_id=${encodeURIComponent(bookId)}`);
    } else {
        console.warn('Response invalid, attempting fallback redirect...');
        window.location.replace(`${window.RelRoot}school.local/my-learning.html?new_book=true&book_id=${encodeURIComponent(bookId)}`);
    }
  } catch (error) {
    console.error('Details:', error);
    if (error.message.includes('Network Error')) {
        console.warn('Network error detected, attempting fallback redirect...');
        window.location.replace(`${window.RelRoot}school.local/my-learning.html?new_book=true&book_id=${encodeURIComponent(bookId)}`);
    } else {
        Toast.error('Error, please try again.');
        if (buyButton) {
          buyButton.disabled = false;
          buyButton.textContent = 'Buy Ebook';
        }
    }
  }
}

document.addEventListener('DOMContentLoaded', loadBookDetails);
</script>

<!-- Distractor: Chat Widget -->
<div class="chat-widget" onclick="Toast.info('Chat support busy. Please try later.')">
  <span style="font-size:24px">💬</span>
</div>
