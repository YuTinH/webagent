<!doctype html>
<html lang="en">
<head>
<script>window.RelRoot = "../";</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Details - Nebula</title>
<link rel="stylesheet" href="../static/skin.css">
<link rel="stylesheet" href="../static/components.css">
<style>
.course-header {
  background: radial-gradient(100% 140% at 0% 0%, rgba(139, 92, 246, .12), transparent 40%), var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  margin-bottom: 24px;
  text-align: center;
}
.course-header h1 {
  font-size: 32px;
  margin: 0 0 12px 0;
}
.course-meta {
  color: var(--muted);
  font-size: 16px;
  margin-bottom: 24px;
}
.course-sections {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 24px;
}
.course-section-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 20px;
}
.section-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 16px;
}
.syllabus-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px dashed var(--border);
}
.syllabus-item:last-child {
  border-bottom: none;
}
.syllabus-icon {
  font-size: 24px;
}
.syllabus-info {
  flex: 1;
}
.syllabus-title {
  font-weight: 500;
}
.syllabus-duration {
  color: var(--muted);
  font-size: 14px;
}
</style>
</head>
<body>

<!-- Navigation -->
<div class="navbar">
  <div class="inner">
    <div class="brand"><div class="logo"></div> Nebula</div>
    <div class="navlinks">
      <a href="../school.local/index.html">Home</a>
      <a href="../school.local/catalog.html">Catalog</a>
      <a href="../school.local/my-learning.html">My Learning</a>
    </div>
    <div style="margin-left:auto">
      <button id="user-menu-btn" style="background:none; border:none; color:var(--text); font-size:20px; cursor:pointer">
        👤
      </button>
    </div>
  </div>
</div>

<div id="__toast" class="toast"></div>

<!-- Main Container -->
<div class="container">

  <div id="course-details">
    <div class="course-header">
      <h1 id="course-title">Loading......</h1>
      <div class="course-meta">Details: <span id="course-instructor"></span> · Details: <span id="course-credits"></span></div>
      <button class="btn pri lg" id="enroll-button" onclick="openEnrollmentModal()">Enroll in Course</button>
    </div>

    <div class="course-sections">
      <div>
        <div class="course-section-card">
          <div class="section-title">Course Overview</div>
          <p id="course-description">Loading......</p>
        </div>
        <div class="course-section-card">
          <div class="section-title">Course Syllabus</div>
          <div id="course-syllabus">
            <!-- Syllabus items injected here -->
          </div>
        </div>
      </div>
      <div>
        <div class="course-section-card">
          <div class="section-title">Enrollment Status</div>
          <div style="text-align:center; color:var(--muted); font-size:14px">Enroll to add this course to My Learning.</div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">Nebula · Synthetic UI for Web Agent Research</div>
</div>

<!-- JavaScript -->
<script src="../static/common.js"></script>
<script src="../static/components.js"></script>
<script>
let courseId = '';
const courseParams = new URLSearchParams(window.location.search);
const requestedCourseTaskId = courseParams.get('task') || 'J1-2025-ENROLL';

function buildRuntimeCourse(id) {
  return {
    title: `Course ${id}`,
    instructor: 'Nebula Faculty',
    credits: 3,
    description: `Review the course overview, choose an enrollment plan, and add ${id} to My Learning.`,
    syllabus: [
      { title: 'Orientation', duration: '1 week' },
      { title: 'Core Concepts', duration: '2 weeks' },
      { title: 'Project Review', duration: '1 week' }
    ]
  };
}

function openEnrollmentModal() {
  new Modal({
    title: 'Complete Enrollment',
    content: `
      <div class="form">
        <label>Enrollment Term</label>
        <select id="enrollment-term" class="input">
          <option value="">Choose a term</option>
          <option value="Summer 2026">Summer 2026</option>
          <option value="Autumn 2026">Autumn 2026</option>
          <option value="Winter 2027">Winter 2027</option>
        </select>

        <label>Study Mode</label>
        <select id="study-mode" class="input">
          <option value="">Choose a study mode</option>
          <option value="online">Online</option>
          <option value="hybrid">Hybrid</option>
          <option value="self-paced">Self-paced</option>
        </select>

        <label>Learning Goal</label>
        <textarea id="learning-goal" class="input" rows="3" placeholder="Describe what you want to achieve in this course"></textarea>
      </div>
    `,
    confirmText: 'Confirm Enrollment',
    onConfirm: async () => {
      const term = document.getElementById('enrollment-term').value.trim();
      const studyMode = document.getElementById('study-mode').value.trim();
      const learningGoal = document.getElementById('learning-goal').value.trim();

      if (!term || !studyMode || !learningGoal) {
        Toast.error('Choose a term, study mode, and learning goal.');
        return false;
      }

      await submitEnrollment({
        term: term,
        study_mode: studyMode,
        learning_goal: learningGoal
      });
      return true;
    }
  }).open();
}

async function loadCourseDetails() {
  const urlParams = new URLSearchParams(window.location.search);
  courseId = urlParams.get('id') || 'DL101';
  
  const courseMap = {
    'DL101': {
      title: 'Web Agent',
      instructor: 'Masteryth',
      credits: 3,
      description: 'Web AgentError, please try again.。',
      syllabus: [
        { title: 'Web Agent', duration: '1' },
        { title: 'Playwright', duration: '2' }
      ]
    },
    'ML202': {
      title: '机器学习进阶',
      instructor: 'Alice',
      credits: 4,
      description: 'An advanced machine learning course covering CNNs, RNNs, and Transformer-based modeling.',
      syllabus: [
        { title: 'Probability and Optimization', duration: '2' },
        { title: 'CNN and RNN Foundations', duration: '3' },
        { title: 'Transformer', duration: '3' },
        { title: 'Applied Projects', duration: '2' }
      ]
    },
    'SYS240': {
      title: '机器学习进阶',
      instructor: 'Alice',
      credits: 4,
      description: 'An advanced machine learning course covering CNNs, RNNs, and Transformer-based modeling.',
      syllabus: [
        { title: 'Probability and Optimization', duration: '2' },
        { title: 'CNN and RNN Foundations', duration: '3' },
        { title: 'Transformer', duration: '3' },
        { title: 'Applied Projects', duration: '2' }
      ]
    },
    'ART205': {
      title: 'Creative Systems Studio',
      instructor: 'Nina',
      credits: 2,
      description: 'A studio course focused on visual storytelling and interactive design.',
      syllabus: [
        { title: 'Narrative Framing', duration: '1' },
        { title: 'Interaction Sketching', duration: '2' },
        { title: 'Portfolio Critique', duration: '1' }
      ]
    }
  };

  const course = courseMap[courseId] || buildRuntimeCourse(courseId);
  if (course) {
    document.getElementById('page-title').textContent = `${course.title} - Nebula`;
    document.getElementById('course-title').textContent = course.title;
    document.getElementById('course-instructor').textContent = course.instructor;
    document.getElementById('course-credits').textContent = course.credits;
    document.getElementById('course-description').textContent = course.description;

    const syllabusContainer = document.getElementById('course-syllabus');
    syllabusContainer.innerHTML = course.syllabus.map(item => `
      <div class="syllabus-item">
        <div class="syllabus-icon">📖</div>
        <div class="syllabus-info">
          <div class="syllabus-title">${item.title}</div>
          <div class="syllabus-duration">${item.duration}</div>
        </div>
      </div>
    `).join('');

    // Check if already enrolled
    const env = await loadEnv();
    const enrolled = env.courses?.[courseId]?.state === 'enrolled';
    if (enrolled) {
      const btn = document.getElementById('enroll-button');
      btn.textContent = 'Enrolled';
      btn.disabled = true;
      btn.classList.remove('pri');
      btn.classList.add('ok');
      return;
    }
  } else {
    document.getElementById('course-details').innerHTML = '<div class="course-header"><h1>Information</h1></div>';
  }
}

async function submitEnrollment(payload) {
  const btn = document.getElementById('enroll-button');
  btn.disabled = true;
  btn.textContent = 'Submitting Enrollment...';

  try {
    const response = await send(resolveTaskId(requestedCourseTaskId), 'enroll_course', {
      courseId: courseId,
      ...payload
    });

    if (response && (response.success || response.redirect)) {
      Toast.success('Enrollment completed.');
      window.location.replace(response.redirect || `${window.RelRoot}school.local/my-learning.html?enrolled=true`);
    } else {
        console.warn('Response invalid, attempting fallback redirect...');
        window.location.replace(`${window.RelRoot}school.local/my-learning.html?enrolled=true`);
    }
  } catch (error) {
    console.error('Details:', error);
    if (error.message.includes('Network Error')) {
        console.warn('Network error detected, attempting fallback redirect...');
        window.location.replace(`${window.RelRoot}school.local/my-learning.html?enrolled=true`);
    } else {
        Toast.error('Error, please try again.');
        btn.disabled = false;
        btn.textContent = 'Enroll in Course';
    }
  }
}

document.addEventListener('DOMContentLoaded', loadCourseDetails);
</script>

<!-- Distractor: Chat Widget -->
<div class="chat-widget" onclick="Toast.info('Chat support busy. Please try later.')">
  <span style="font-size:24px">💬</span>
</div>
