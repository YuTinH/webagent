<!doctype html>
<html lang="en">
<head>
<script>window.RelRoot = "../";</script>
<meta charset="utf-8">
<title>Address Change - Gov Portal</title>
<link rel="stylesheet" href="../static/skin.css">
<link rel="stylesheet" href="../static/components.css">
</head>
<body class="page">
<div class="navbar">
  <div class="inner"><div class="brand">🏛️ Gov Portal</div></div>
</div>

<div class="container" style="max-width:600px">
  <h1>Change of Address</h1>
  <div class="card soft">
    <div class="form">
      <div class="form-group">
        <label>New Residential Address</label>
        <input type="text" id="new-address" class="input" placeholder="e.g. 742 Evergreen Terrace">
      </div>
      <div class="form-group">
        <label>Zip Code</label>
        <input type="text" id="zip-code" class="input" placeholder="12345">
      </div>
      <div class="form-group">
        <label>Proof Document</label>
        <select id="proof-document" class="input">
          <option value="proof_of_address.pdf">Proof of Address PDF</option>
          <option value="bank_statement.pdf">Bank Statement PDF</option>
          <option value="lease_contract.pdf">Lease Contract PDF</option>
        </select>
      </div>
      <button class="btn pri lg" id="submit-addr-btn" style="width:100%" onclick="submitChange()">Submit Change Request</button>
    </div>
  </div>
</div>

<script src="../static/common.js"></script>
<script>
async function submitChange() {
  const addr = document.getElementById('new-address').value;
  const zip = document.getElementById('zip-code').value;
  if(!addr) return alert("Please enter address");
  
  await send(resolveTaskId('H1-2025-ADDRCHANGE'), 'change_address', {
    new_address: addr,
    zip_code: zip,
    proof_document: document.getElementById('proof-document').value
  });
  Toast.success("Address update request submitted.");
  setTimeout(() => location.href = 'profile.html', 1500);
}
</script>
</body>
</html>
