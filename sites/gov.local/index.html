<!doctype html>
<html lang="en">
<head>
<script>window.RelRoot = "../";</script>
<meta charset="utf-8">
<title>Gov Portal - Home</title>
<link rel="stylesheet" href="../static/skin.css">
<link rel="stylesheet" href="../static/components.css">
<style>
.gov-hero { background: linear-gradient(135deg, #1e293b, #334155); color: white; padding: 60px 24px; text-align: center; border-radius: 16px; margin-bottom: 32px; }
.service-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
.service-card { background: var(--card); border: 1px solid var(--border); padding: 24px; border-radius: 12px; text-align: center; cursor: pointer; transition: .2s; text-decoration: none; color: inherit; }
.service-card:hover { border-color: var(--pri); transform: translateY(-4px); }
.service-icon { font-size: 32px; margin-bottom: 12px; }
</style>
</head>
<body class="page">
<div class="navbar">
  <div class="inner">
    <div class="brand">🏛️ Gov Portal</div>
    <div class="navlinks"><a href="profile.html">My Profile</a></div>
  </div>
</div>

<div class="container">
  <div class="gov-hero">
    <h1>Welcome to Springfield Digital Government</h1>
    <p>Access municipal services, permits, and documentation online.</p>
  </div>

  <div class="service-grid">
    <a href="address-change.html" class="service-card">
      <div class="service-icon">📍</div>
      <h3>Address Change</h3>
      <p style="font-size:12px; color:var(--muted)">Report a change of residence.</p>
    </a>
    <a href="parking-permits.html" class="service-card">
      <div class="service-icon">🚗</div>
      <h3>Parking Permits</h3>
      <p style="font-size:12px; color:var(--muted)">Apply for resident parking.</p>
    </a>
    <a href="profile.html" class="service-card">
      <div class="service-icon">👤</div>
      <h3>My Profile</h3>
      <p style="font-size:12px; color:var(--muted)">Manage personal ID and verification.</p>
    </a>
  </div>
</div>
<script src="../static/common.js"></script>
</body>
</html>
