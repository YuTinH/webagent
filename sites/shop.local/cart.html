<!DOCTYPE html>
<html lang="en">
<head>
<script>window.RelRoot = "../";</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart - Nebula</title>
<link rel="stylesheet" href="../static/skin.css">
<link rel="stylesheet" href="../static/components.css">
</head>
<body>

<div class="navbar">
  <div class="inner">
    <div class="brand">Nebula</div>
    <div class="navlinks">
      <a href="index.html">Home</a>
      <a href="cart.html" class="active">Shopping Cart</a>
      <a href="orders.html">My Orders</a>
    </div>
  </div>
</div>

<div class="container">
  <h1>Shopping Cart</h1>
  
  <div class="panel" id="cart-panel">
    <div id="cart-items">
      <div class="p-8 text-center muted">Shopping Cart...</div>
    </div>
    
    <div class="cart-footer" style="padding: 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; align-items: center; gap: 20px;">
      <div class="text-xl font-bold">Total: <span id="cart-total">¥0.00</span></div>
      <button id="checkout-btn" class="btn pri lg" onclick="proceedToCheckout()">Checkout</button>
    </div>
  </div>
</div>

<script src="../static/common.js"></script>
<script src="../static/components.js"></script>
<script>
    const cartPageParams = new URLSearchParams(window.location.search);
    const requestedCartTaskId = cartPageParams.get('task') || 'B1-2025-001';
    const cartTaskId = resolveTaskId(requestedCartTaskId);

    // Load cart immediately from localStorage
    let cart = [];
    try {
        cart = JSON.parse(localStorage.getItem('cart') || '[]');
        console.log('DEBUG: Cart loaded sync:', cart);
    } catch (e) {
        console.error('Cart parse error:', e);
    }

    function renderCart() {
        const cartItemsContainer = document.getElementById('cart-items');
        const checkoutBtn = document.getElementById('checkout-btn');
        const totalEl = document.getElementById('cart-total');

        if (cart.length === 0) {
            cartItemsContainer.innerHTML = '<div class="p-8 text-center muted">Shopping Cart</div>';
            totalEl.textContent = '¥0.00';
            checkoutBtn.disabled = true;
            return;
        }

        let subtotal = 0;
        cartItemsContainer.innerHTML = cart.map(item => {
            const itemTotal = item.price * (item.quantity || 1);
            subtotal += itemTotal;
            return `
                <div class="flex items-center gap-4 p-4 border-b">
                    <div style="flex:1">
                        <div class="font-bold">${item.name}</div>
                        <div class="muted">¥${item.price.toFixed(2)} x ${item.quantity || 1}</div>
                    </div>
                    <div class="font-bold">¥${itemTotal.toFixed(2)}</div>
                </div>
            `;
        }).join('');

        const shipping = 0.00; // Keep benchmark totals aligned with task criteria
        const finalTotal = subtotal + shipping;
        
        totalEl.textContent = `¥${finalTotal.toFixed(2)}`;
        checkoutBtn.disabled = false;
    }

    async function proceedToCheckout() {
        const btn = document.getElementById('checkout-btn');
        btn.disabled = true;
        btn.textContent = "Processing...";
        
        const order_id = `O-${Math.floor(Math.random() * 100000) + 10000}`;
        // Calculate total again to be safe
        const subtotal = cart.reduce((sum, item) => sum + item.price * (item.quantity || 1), 0);
        const total = subtotal + 0.00;

        try {
            console.log("Submitting checkout...");
            
            const itemsPayload = cart.map(item => ({
                product_id: item.product_id, 
                quantity: item.quantity || 1,
                name: item.name,
                price: item.price,
                category: item.category,
                sku: item.sku
            }));

            const shippingSpeed = localStorage.getItem('checkout_shipping_speed') || 'standard';

            const response_data = await send(cartTaskId, 'create_order', { 
                order_id: order_id,
                items: itemsPayload,
                total: parseFloat(total.toFixed(2)),
                shipping_address: "123 Main St", 
                shipping_speed: shippingSpeed
            });
            
            console.log('DEBUG: send() response:', response_data);
            // The send() function already handles window.location.href = json.redirect
            // So we only need a fallback if it's NOT a redirect and we expect one for success.
            if (response_data && !response_data.redirect && !response_data.error) {
                window.location.href = `order/confirmation/${order_id}?total=${total.toFixed(2)}`;
            }
            
        } catch (e) {
            console.error("Checkout failed:", e);
            Toast.error("Details: " + e.message);
            btn.disabled = false;
            btn.textContent = "Checkout";
        }
    }

    // Render immediately on load
    document.addEventListener('DOMContentLoaded', renderCart);
</script>
