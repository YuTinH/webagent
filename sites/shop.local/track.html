<!doctype html>
<html lang="en">
<head>
<script>window.RelRoot = "../";</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> - Nebula</title>
<link rel="stylesheet" href="../static/skin.css">
<link rel="stylesheet" href="../static/components.css">
<style>
.tracking-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  text-align: center;
}
.tracking-id {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 24px;
}
.tracking-status {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
  position: relative;
}
.status-step {
  flex: 1;
  text-align: center;
  position: relative;
  z-index: 1;
}
.step-dot {
  width: 24px;
  height: 24px;
  background: var(--muted);
  border-radius: 50%;
  margin: 0 auto 8px auto;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 700;
  font-size: 14px;
}
.step-dot.active {
  background: var(--pri);
}
.step-dot.completed {
  background: var(--ok);
}
.step-text {
  color: var(--muted);
  font-size: 14px;
}
.step-text.active, .step-text.completed {
  color: var(--text);
}
.status-line {
  position: absolute;
  top: 11px;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--border);
  z-index: 0;
}
.status-progress {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  background: var(--pri);
  width: 0%;
  transition: width 0.5s ease-in-out;
}
</style>
</head>
<body>

<!-- Navigation -->
<div class="navbar">
  <div class="inner">
    <div class="brand">
      <div class="logo"></div>
      Nebula
    </div>
    <div class="navlinks">
      <a href="../shop.local/index.html">Home</a>
      <a href="../shop.local/orders.html" class="active">Information</a>
      <a href="../pay.local/wallet/cards.html">Information</a>
    </div>
    <div style="display:flex; gap:16px; margin-left:16px">
      <button class="wishlist-icon-btn" onclick="openWishlist()" style="background:none; border:none; color:var(--text); font-size:20px; cursor:pointer; position:relative">
        ❤️
        <span id="wishlist-count" class="cart-count" style="display:none">0</span>
      </button>
      <button class="cart-icon-btn" onclick="openCartDrawer()" style="background:none; border:none; color:var(--text); font-size:20px; cursor:pointer; position:relative">
        🛒
        <span id="cart-count" class="cart-count" style="display:none">0</span>
      </button>
      <button id="user-menu-btn" style="background:none; border:none; color:var(--text); font-size:20px; cursor:pointer">
        👤
      </button>
    </div>
  </div>
</div>

<div id="__toast" class="toast"></div>

<!-- Main Container -->
<div class="container">

  <h1 style="font-size:28px; font-weight:700; margin:24px 0">Order跟踪（订单跟踪）</h1>

  <!-- Tracking Card -->
  <div class="tracking-card">
    <div class="tracking-id">Details: <span id="order-id">Loading......</span></div>

    <div class="tracking-status">
      <div class="status-line"><div class="status-progress" id="status-progress"></div></div>
      <div class="status-step" id="step-confirmed">
        <div class="step-dot">1</div>
        <div class="step-text">Confirm</div>
      </div>
      <div class="status-step" id="step-shipped">
        <div class="step-dot">2</div>
        <div class="step-text">Information</div>
      </div>
      <div class="status-step" id="step-transit">
        <div class="step-dot">3</div>
        <div class="step-text">Information</div>
      </div>
      <div class="status-step" id="step-delivered">
        <div class="step-dot">4</div>
        <div class="step-text">Delivered</div>
      </div>
    </div>
    
    <div style="display:flex; gap:12px; justify-content:center; margin-top:20px">
      <button id="refresh-tracking-btn" class="btn secondary" onclick="refreshTrackingStatus()">Refresh Carrier Status</button>
      <button class="btn pri" onclick="window.location.href=window.RelRoot+'shop.local/orders.html'">Back</button>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    Nebula · Synthetic UI for Web Agent Research
  </div>

</div>

<!-- JavaScript -->
<script src="../static/common.js"></script>
<script src="../static/components.js"></script>
<script>
const statusMap = {
  'confirmed': 0,
  'shipped': 1,
  'transit': 2,
  'delivered': 3
};
let currentOrderId = '';
let currentOrderState = '';

async function syncTrackedOrderState(status) {
  const keys = ['shop.orders.last.state', 'orders.last.state'];
  await Promise.all(keys.map((key) => fetch(`${window.RelRoot}api/memory`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({key, value: String(status || ''), source: 'system'})
  })));
}

function updateRefreshButton(status) {
  const button = document.getElementById('refresh-tracking-btn');
  if (!button) return;
  const delivered = status === 'delivered';
  button.disabled = delivered;
  button.textContent = delivered ? 'Delivered' : 'Refresh Carrier Status';
}

async function loadTrackingInfo() {
  const urlParams = new URLSearchParams(window.location.search);
  const orderId = urlParams.get('order_id');
  const orderIdDisplay = document.getElementById('order-id');

  if (!orderId) {
    orderIdDisplay.textContent = '';
    return;
  }

  orderIdDisplay.textContent = orderId;
  currentOrderId = orderId;

  try {
    const response = await fetch(`${window.RelRoot}api/orders/${orderId}`);
    const data = await response.json();

    if (data.success && data.order) {
      currentOrderState = data.order.state;
      updateTrackingStatus(data.order.state);
      updateRefreshButton(data.order.state);
      await syncTrackedOrderState(data.order.state);
    } else {
      Toast.error('Details');
    }
  } catch (error) {
    console.error('DetailsDetails:', error);
    Toast.error('Details');
  }
}

function updateTrackingStatus(status) {
  const stepIndex = statusMap[status] || 0;
  const steps = document.querySelectorAll('.status-step');
  const statusProgress = document.getElementById('status-progress');

  steps.forEach((step, index) => {
    step.querySelector('.step-dot').classList.remove('active', 'completed');
    step.querySelector('.step-text').classList.remove('active', 'completed');
    if (index < stepIndex) {
      step.querySelector('.step-dot').classList.add('completed');
      step.querySelector('.step-text').classList.add('completed');
    } else if (index === stepIndex) {
      step.querySelector('.step-dot').classList.add('active');
      step.querySelector('.step-text').classList.add('active');
    }
  });

  statusProgress.style.width = `${(stepIndex / (steps.length - 1)) * 100}%`;
}

async function refreshTrackingStatus() {
  if (!currentOrderId) {
    Toast.error('Order ID is missing.');
    return;
  }
  if (currentOrderState === 'delivered') {
    Toast.success('Order is already delivered.');
    return;
  }
  await fetch(`${window.RelRoot}api/debug/time_travel`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({days: 3})
  });
  await loadTrackingInfo();
}

document.addEventListener('DOMContentLoaded', loadTrackingInfo);
</script>

<!-- Distractor: Chat Widget -->
<div class="chat-widget" onclick="Toast.info('Chat support busy. Please try later.')">
  <span style="font-size:24px">💬</span>
</div>
