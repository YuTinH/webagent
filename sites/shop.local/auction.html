<!doctype html>
<html lang="en">
<head>
<script>window.RelRoot = "../";</script>
  <meta charset="utf-8">
  <title>Live Auction - Nebula Shop</title>
  <link rel="stylesheet" href="../static/skin.css">
  <link rel="stylesheet" href="../static/components.css">
  <script src="../static/common.js"></script>
  <script src="../static/components.js"></script>
</head>
<body class="page">
  <div class="navbar">
    <div class="inner">
      <div class="brand">🛍️ Shop.local</div>
      <div class="navlinks">
        <a href="../shop.local/index.html">Home</a>
        <a href="../shop.local/auction.html" class="active">Live Auction</a>
      </div>
    </div>
  </div>
  
  <div class="container" style="max-width:800px">
    <div class="card soft">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <h1>🏺 Ming Vase Auction</h1>
            <span class="badge warn" id="status-badge">Live</span>
        </div>
        
        <div style="margin: 24px 0; text-align:center">
            <div style="font-size:14px; color:var(--muted)">Current Highest Bid</div>
            <div style="font-size:48px; font-weight:800; color:var(--pri)" id="current-price">¥100.00</div>
            <div style="margin-top:8px" id="bidder-info">Highest bidder: System</div>
        </div>

        <div class="form">
            <label>Place Bid (minimum increment ¥10)</label>
            <div style="display:flex; gap:12px">
                <input id="bid-amount" type="number" class="input" value="110">
                <button id="place-bid-btn" class="btn pri" onclick="placeBid()">Place Bid</button>
            </div>
        </div>
        
        <div style="margin-top:24px; padding:16px; background:rgba(0,0,0,0.05); border-radius:8px">
            <h3>Auction Rules</h3>
            <p>1. Every new bid must be higher than the current price.</p>
            <p>2. The maximum budget for this demo item is ¥500.</p>
        </div>
    </div>
  </div>

  <script>
  const cleanMode = new URLSearchParams(window.location.search).get('clean') === 'true';
  let currentPrice = 100.00;
  let isAuctionActive = true;

  // Simulate live updates
  if (!cleanMode) setInterval(() => {
      if (!isAuctionActive) return;
      
      // Randomly increase price to simulate other bidders
      if (Math.random() > 0.7) {
          const increase = Math.floor(Math.random() * 20) + 10;
          currentPrice += increase;
          updateDisplay();
          
          if (currentPrice > 600) {
              isAuctionActive = false;
              document.getElementById('status-badge').textContent = "Closed";
              document.getElementById('status-badge').className = "badge err";
          }
      }
  }, 2000); // Update every 2 seconds

  loadEnv().then(env => {
      const auction = env.auctions?.['VASE-001'];
      if (auction && auction.current_price) {
          currentPrice = parseFloat(auction.current_price);
          if (auction.highest_bidder === 'user') {
              isAuctionActive = false;
              document.getElementById('bidder-info').textContent = 'Highest bidder: You';
              document.getElementById('status-badge').textContent = 'Leading';
              document.getElementById('status-badge').className = 'badge ok';
          }
          updateDisplay();
      }
  }).catch(() => {});

  function updateDisplay() {
      document.getElementById('current-price').textContent = `¥${currentPrice.toFixed(2)}`;
      document.getElementById('bid-amount').min = currentPrice + 10;
      document.getElementById('bid-amount').value = currentPrice + 10;
  }

  async function placeBid() {
      const bid = parseFloat(document.getElementById('bid-amount').value);
      
      if (bid <= currentPrice) {
          Toast.error("Enter a bid above the current price.");
          return;
      }
      
      // Send bid to server
      const resp = await send(resolveTaskId('Z3-2025-AUCTION'), 'place_bid', {
          auction_id: 'VASE-001',
          bid_amount: bid
      });
      
      console.log('DEBUG: placeBid response:', JSON.stringify(resp));

      if (resp && resp.success) {
          currentPrice = bid;
          isAuctionActive = false;
          document.getElementById('bidder-info').textContent = "Highest bidder: You";
          document.getElementById('status-badge').textContent = 'Leading';
          document.getElementById('status-badge').className = 'badge ok';
          document.getElementById('place-bid-btn').textContent = 'Leading Bid';
          updateDisplay();
          Toast.success("Bid submitted.");
      } else {
          Toast.error("Bid could not be submitted.");
      }
  }
  
  updateDisplay();
  </script>
