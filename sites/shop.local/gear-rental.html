<!doctype html>
<html lang="en">
<head>
<script>window.RelRoot = "../";</script>
  <meta charset="utf-8">
  <title>shop.local - </title>
  <link rel="stylesheet" href="../static/skin.css">
  <link rel="stylesheet" href="../static/components.css">
  <script src="../static/common.js"></script>
  <script src="../static/components.js"></script>
</head>
<body class="page">
  <div class="navbar">
    <div class="inner">
      <div class="brand">🛍️ Shop.local</div>
      <div class="navlinks">
        <a href="../shop.local/index.html">Storefront</a>
        <a href="../shop.local/orders.html">Orders</a>
        <a href="../shop.local/gear-rental.html" class="active">Gear Rental</a>
      </div>
    </div>
  </div>
  
  <div class="container" style="max-width:800px">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px">
      <h1>Gear Rental Marketplace</h1>
      <button id="open-list-gear-modal-btn" class="btn pri" onclick="openListGearModal()">List Gear</button>
    </div>

    <div class="card soft" style="margin-bottom:24px">
        <h2>Rental Listings</h2>
        <div id="rental-gear-list" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:16px">
            <!-- Rental gear loaded here -->
        </div>
    </div>

    <h2>My Sale Listings</h2>
    <div id="selling-gear-list" style="display:flex; flex-direction:column; gap:16px">
      <!-- Selling gear loaded here -->
      <div class="card soft" style="text-align:center; padding:24px">
        <div style="color:var(--muted)">Information</div>
      </div>
    </div>
  </div>

  <script>
  async function loadGear() {
    const rentalList = document.getElementById('rental-gear-list');
    const sellingList = document.getElementById('selling-gear-list');
    rentalList.innerHTML = '<div class="loading">Loading......</div>';
    sellingList.innerHTML = '<div class="loading">Loading......</div>';
    
    try {
      const env = await loadEnv();
      const rentalGear = env.gear?.rentals || {};
      const sellingGear = env.gear?.sales || {};

      if (Object.keys(rentalGear).length === 0) {
        rentalList.innerHTML = `<div class="card soft" style="text-align:center; padding:24px"><div style="color:var(--muted)">No rental listings are available right now.</div></div>`;
      } else {
        rentalList.innerHTML = Object.entries(rentalGear).map(([id, gear]) => `
          <div class="card soft">
            <h3 style="margin:0 0 4px 0">${gear.name}</h3>
            <div style="color:var(--muted); font-size:14px">Details: ¥${gear.rental_price}/</div>
            <div style="color:var(--muted); font-size:14px">Status: ${gear.status}</div>
          </div>
        `).join('');
      }

      if (Object.keys(sellingGear).length === 0) {
        sellingList.innerHTML = `<div class="card soft" style="text-align:center; padding:24px"><div style="color:var(--muted)">You have not listed any gear for sale yet.</div></div>`;
      } else {
        sellingList.innerHTML = Object.entries(sellingGear).map(([id, gear]) => `
          <div class="card soft">
            <div style="display:flex; justify-content:space-between; margin-bottom:8px">
              <div>
                <h3 style="margin:0 0 4px 0">${gear.name} (#${id})</h3>
                <div style="color:var(--muted); font-size:14px">Details: ${gear.type}</div>
              </div>
              <div style="text-align:right">
                <div style="font-weight:600">Details: ¥${gear.price}</div>
                <div style="color:var(--muted); font-size:13px">Status: <span class="badge ${gear.status === 'listed' ? 'ok' : 'warn'}">${gear.status}</span></div>
              </div>
            </div>
            <div style="display:flex; gap:8px">
              <button id="edit-gear-listing-${id}" class="btn" onclick="editListing('${id}')">Edit Listing</button>
              <button id="remove-gear-listing-${id}" class="btn secondary" onclick="removeListing('${id}')">Remove Listing</button>
            </div>
          </div>
        `).join('');
      }
      
    } catch (e) {
      console.error(e);
      rentalList.innerHTML = '<div class="error">Load failed</div>';
      sellingList.innerHTML = '<div class="error">Load failed</div>';
    }
  }

  function openListGearModal() {
    new Modal({
      title: 'Create Gear Listing',
      content: `
        <div class="form">
          <label>Gear Name</label>
          <input id="gear-name" class="input" placeholder="e.g. Mountain bike, DSLR camera">
          
          <label>Listing Type</label>
          <select id="listing-type" class="input">
            <option value="sale">Sell</option>
            <option value="rent">Rent Out</option>
          </select>

          <label>Price (Price)</label>
          <input id="gear-price" type="number" class="input" placeholder="Details: 500">
        </div>
      `,
      confirmText: 'Submit',
      onConfirm: async () => {
        const name = document.getElementById('gear-name').value;
        const type = document.getElementById('listing-type').value;
        const price = document.getElementById('gear-price').value;
        
        if (!name || !price) {
          Toast.error("Enter the gear name and price.");
          return;
        }
        
        await send(resolveTaskId('J4-2025-GEAR'), 'manage_gear_listing', {
          action_type: 'list',
          name: name,
          type: type,
          price: parseFloat(price)
        });
        
        setTimeout(loadGear, 500);
      }
    }).open();
  }

  function editListing(id) {
    Toast.info(`Edit ${id} ()`);
  }

  function removeListing(id) {
    new Modal({
      title: 'Confirm',
      content: `Remove listing ${id}?`,
      confirmText: 'Confirm',
      onConfirm: async () => {
        await send(resolveTaskId('J4-2025-GEAR'), 'manage_gear_listing', {
          action_type: 'remove',
          gear_id: id
        });
        setTimeout(loadGear, 500);
      }
    }).open();
  }

  document.addEventListener('DOMContentLoaded', loadGear);
  </script>
