<!doctype html>
<html lang="en">
<head>
<script>window.RelRoot = "../";</script>
  <meta charset="utf-8">
  <title>social.local - </title>
  <link rel="stylesheet" href="../static/skin.css">
  <link rel="stylesheet" href="../static/components.css">
  <script src="../static/common.js"></script>
  <script src="../static/components.js"></script>
</head>
<body class="page">
  <div class="navbar">
    <div class="inner">
      <div class="brand">🤝 Social.local</div>
      <div class="navlinks">
        <a href="../social.local/my-groups.html">My Groups</a>
        <a href="../social.local/split.html">Expense Split</a>
        <a href="../social.local/charity.html" class="active">Donations</a>
      </div>
    </div>
  </div>
  
  <div class="container" style="max-width:800px">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px">
      <h1>Donations & Receipts</h1>
      <button class="btn pri" id="open-donate-modal-btn" onclick="openDonateModal()">Add Donation</button>
    </div>

    <div class="card soft" style="margin-bottom:24px">
        <h2>Donation Summary (2025)</h2>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:16px">
            <div>
                <div style="color:var(--muted); font-size:14px">Total Donations</div>
                <div style="font-size:24px; font-weight:700" id="total-donations">¥0.00</div>
            </div>
            <div>
                <div style="color:var(--muted); font-size:14px">Tax-Deductible Total</div>
                <div style="font-size:24px; font-weight:700" id="total-tax-deductible">¥0.00</div>
            </div>
        </div>
    </div>

    <h2>Donation History</h2>
    <div id="donations-list" style="display:flex; flex-direction:column; gap:16px">
      <!-- Donations loaded here -->
    </div>
  </div>

  <script>
  const charityParams = new URLSearchParams(window.location.search);
  const requestedCharityTaskId = charityParams.get('task') || 'K3-2025-CHARITY';
  const charityTaskId = resolveTaskId(requestedCharityTaskId);

  async function loadDonation() {
    const list = document.getElementById('donations-list');
    list.innerHTML = '<div class="loading">Loading......</div>';
    
    try {
      const env = await loadEnv();
      const donations = env.charity?.donations || {};
      
      let totalDonations = 0;
      let taxDeductible = 0;

      if (Object.keys(donations).length === 0) {
        list.innerHTML = `
          <div class="soft" style="text-align:center; padding:48px; border:1px dashed var(--border); border-radius:var(--radius)">
            <div style="font-size:48px; margin-bottom:16px">❤️</div>
            <div style="color:var(--muted)">No donations recorded yet.</div>
          </div>
        `;
      } else {
        list.innerHTML = Object.entries(donations).map(([id, donation]) => {
            totalDonations += donation.amount;
            if (donation.tax_deductible) taxDeductible += donation.amount;

            return `
              <div class="card soft">
                <div style="display:flex; justify-content:space-between; margin-bottom:8px">
                  <div>
                    <h3 style="margin:0 0 4px 0">${donation.charity_name}</h3>
                    <div style="color:var(--muted); font-size:14px">Date: ${donation.date}</div>
                  </div>
                  <div style="text-align:right">
                    <div style="font-weight:600">¥${parseFloat(donation.amount).toFixed(2)}</div>
                    <div style="color:var(--muted); font-size:13px">Receipt: <span class="badge ${donation.tax_deductible ? 'ok' : 'warn'}">${donation.tax_deductible ? 'Tax-deductible' : 'Standard'}</span></div>
                  </div>
                </div>
                <button class="btn secondary" onclick="getReceipt('${id}')" ${!donation.tax_deductible ? 'disabled' : ''}>Get Receipt</button>
              </div>
            `;
        }).join('');
	      }

	      document.getElementById('total-donations').innerText = `¥${totalDonations.toFixed(2)}`;
	      document.getElementById('total-tax-deductible').innerText = `¥${taxDeductible.toFixed(2)}`;
	      
	    } catch (e) {
	      console.error(e);
      list.innerHTML = '<div class="error">Load failed</div>';
    }
  }

  function openDonateModal() {
    new Modal({
      title: 'Record Donation',
      content: `
        <div class="form">
          <label>Charity Name</label>
          <input id="charity-name" class="input" placeholder="Enter charity name">
          
          <label>Donation Amount</label>
          <input id="donation-amount" type="number" class="input" placeholder="100.00">

          <div style="margin-top:16px; display:flex; align-items:center; gap:8px">
            <input type="checkbox" id="tax-deductible">
            <label for="tax-deductible" style="margin:0">Tax-deductible receipt required</label>
          </div>
        </div>
      `,
      confirmText: 'Record Donation',
      onConfirm: async () => {
        const charityName = document.getElementById('charity-name').value.trim();
        const amount = document.getElementById('donation-amount').value;
        const taxDeductible = document.getElementById('tax-deductible').checked;
        
        if (!charityName || !amount) {
          Toast.error("Enter a charity name and donation amount.");
          return false;
        }

        await send(charityTaskId, 'make_donation', {
          charity_name: charityName,
          amount: parseFloat(amount),
          tax_deductible: taxDeductible
        });
        
        setTimeout(loadDonation, 500);
        return true;
      }
    }).open();
  }

  function getReceipt(id) {
    Toast.info(`Preparing receipt ${id}...`);
    // In a real app, this would trigger a backend process to generate and download a PDF receipt.
  }

  document.addEventListener('DOMContentLoaded', () => {
    loadDonation();
  });
  </script>
