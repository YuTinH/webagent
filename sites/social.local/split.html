<!doctype html>
<html lang="en">
<head>
<script>window.RelRoot = "../";</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> - </title>
<link rel="stylesheet" href="../static/skin.css">
<link rel="stylesheet" href="../static/components.css">
<style>
.split-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  margin-bottom: 24px;
}
.summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 24px;
}
.summary-item {
  background: rgba(255,255,255,0.05);
  border-radius: 8px;
  padding: 16px;
}
.summary-label {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 8px;
}
.summary-value {
  font-size: 24px;
  font-weight: 700;
}
.member-list {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}
.member-tag {
  background: var(--pri);
  color: white;
  padding: 8px 12px;
  border-radius: 20px;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.form-group {
  margin-bottom: 16px;
}
.form-group label {
  display: block;
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 8px;
}
.form-group input, .form-group select {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  color: var(--text);
  font-size: 15px;
}
.form-group input:focus, .form-group select:focus {
  outline: none;
  border-color: var(--pri);
  box-shadow: 0 0 0 2px rgba(79,70,229,0.2);
}
.button-group {
  display: flex;
  justify-content: flex-end;
  gap: 12px;
  margin-top: 24px;
}
</style>
</head>
<body>

<!-- Navigation -->
<div class="navbar">
  <div class="inner">
    <div class="brand">
      <div class="logo"></div>
      
    </div>
    <div class="navlinks">
      <a href="../social.local/index.html">Home</a>
      <a href="../social.local/groups.html">Groups</a>
      <a href="../social.local/split.html" class="active">Expense Split</a>
    </div>
  </div>
</div>

<div id="__toast" class="toast"></div>

<!-- Main Container -->
<div class="container">

  <h1 style="font-size:28px; font-weight:700; margin:24px 0">Split Shared Expenses</h1>

  <!-- Expense Split Card -->
  <div class="split-card">
    <div class="summary-grid">
      <div class="summary-item">
        <div class="summary-label">Spending</div>
        <div class="summary-value">¥<span id="total-expenses">0.00</span></div>
      </div>
      <div class="summary-item">
        <div class="summary-label">My Share</div>
        <div class="summary-value">¥<span id="my-share">0.00</span></div>
      </div>
    </div>

    <div class="form-group">
      <label for="month">Settlement Month</label>
      <select id="month">
        <option value="">Select month</option>
        <option value="2025-10">202510</option>
        <option value="2025-11">202511</option>
        <option value="2025-12">202512</option>
      </select>
    </div>

    <div class="form-group">
      <label for="members">Participants</label>
      <div class="member-list" id="member-list">
        <span class="member-tag">Masteryth</span>
        <span class="member-tag">Alice</span>
        <span class="member-tag">Bob</span>
      </div>
    </div>
    
    <div class="form-group">
        <label for="split-rule">Split Rule</label>
        <select id="split-rule">
            <option value="equal">Equal Split</option>
            <option value="by_amount">By Amount</option>
            <option value="by_percentage">By Percentage</option>
        </select>
    </div>

    <div class="button-group">
      <button class="btn pri lg" id="settle-expenses-btn" onclick="settleExpenses()">Settle Expenses</button>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
     · Synthetic UI for Web Agent Research
  </div>

</div>

<!-- JavaScript -->
<script src="../static/common.js"></script>
<script src="../static/components.js"></script>
<script>
let settlement = null;
const splitParams = new URLSearchParams(window.location.search);
const requestedSplitTaskId = splitParams.get('task') || 'K2-2025-010';
const splitTaskId = resolveTaskId(requestedSplitTaskId);

function ensureSplitMonthOption(month) {
  const monthSelect = document.getElementById('month');
  if (!monthSelect || !month) return;
  const existing = Array.from(monthSelect.options).some((option) => option.value === month);
  if (existing) return;
  const option = document.createElement('option');
  option.value = month;
  option.textContent = month.replace('-', '');
  monthSelect.appendChild(option);
}

async function loadSettlementInfo() {
  const urlParams = new URLSearchParams(window.location.search);
  const month = urlParams.get('month') || '';
  const state = urlParams.get('state');

  // Pre-select month in dropdown
  if (month) {
    ensureSplitMonthOption(month);
    document.getElementById('month').value = month;
  }

  if (state === 'settled') {
    Toast.success(`${month} expenses settled.`);
  }

  try {
    const env = await loadEnv();
    settlement = env.settlements?.[month];

    if (settlement) {
      document.getElementById('total-expenses').textContent = '200.00'; // Mock data
      document.getElementById('my-share').textContent = '66.67'; // Mock data

      const memberList = document.getElementById('member-list');
      memberList.innerHTML = settlement.members.map(member => `<span class="member-tag">${member}</span>`).join('');
      document.getElementById('split-rule').value = settlement.rules;
    } else {
      document.getElementById('total-expenses').textContent = '0.00';
      document.getElementById('my-share').textContent = '0.00';
    }
  } catch (e) {
    console.error("Failed to load settlement info:", e);
    Toast.error('Failed to load settlement information.');
  }
}

async function settleExpenses() {
  const month = document.getElementById('month').value;
  const members = ['Masteryth', 'Alice', 'Bob']; // Mock members for now
  const rules = document.getElementById('split-rule').value;

  if (!month) {
    Toast.error('Select a settlement month.');
    return;
  }

  Toast.info(`Settling expenses for ${month}...`);

  try {
    const response = await send(splitTaskId, 'split_expenses', {
      month: month,
      members: members,
      rules: rules
    });

    if (response && response.success) {
      Toast.success(`${month} expenses settled.`);
      window.location.href = `${window.RelRoot}social.local/split.html?month=${month}&state=settled`;
    } else {
      Toast.error('Details: ' + (response ? response.error : ''));
      console.warn('Response invalid, attempting fallback redirect...');
      window.location.href = `${window.RelRoot}social.local/split.html?month=${month}&state=settled`;
    }
  } catch (error) {
    console.error('Details:', error);
    if (error.message.includes('Network Error')) {
        console.warn('Network error detected, attempting fallback redirect...');
        window.location.href = `${window.RelRoot}social.local/split.html?month=${month}&state=settled`;
    } else {
        Toast.error('Error, please try again.');
    }
  }
}

document.addEventListener('DOMContentLoaded', loadSettlementInfo);
</script>

<!-- Distractor: Chat Widget -->
<div class="chat-widget" onclick="Toast.info('Chat support busy. Please try later.')">
  <span style="font-size:24px">💬</span>
</div>
