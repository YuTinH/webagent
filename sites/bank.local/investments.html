<!doctype html>
<html lang="en">
<head>
<script>window.RelRoot = "../";</script>
  <meta charset="utf-8">
  <title>bank.local - </title>
  <link rel="stylesheet" href="../static/skin.css">
  <link rel="stylesheet" href="../static/components.css">
  <script src="../static/common.js"></script>
  <script src="../static/components.js"></script>
</head>
<body class="page">
  <div class="navbar">
    <div class="inner">
      <div class="brand"><div class="logo"></div> Nebula Bank</div>
      <div class="navlinks">
        <a href="../bank.local/dashboard.html">Dashboard</a>
        <a href="../bank.local/transactions.html">Transactions</a>
        <a href="../bank.local/investments.html" class="active">Investments</a>
      </div>
    </div>
  </div>
  
  <div class="container" style="max-width:800px">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px">
      <h1>Investment Accounts</h1>
      <button class="btn pri" id="open-investment-account" onclick="openOpenAccountModal()">Open Account</button>
    </div>

    <div id="investment-accounts-list" style="display:flex; flex-direction:column; gap:16px">
      <!-- Accounts loaded here -->
    </div>
  </div>

  <script>
  const investmentParams = new URLSearchParams(window.location.search);
  const requestedInvestmentTaskId = investmentParams.get('task') || 'D11-2025-INVESTMENT';
  const investmentTaskId = resolveTaskId(requestedInvestmentTaskId);
  async function loadInvestmentAccounts() {
    const list = document.getElementById('investment-accounts-list');
    list.innerHTML = '<div class="loading">Loading......</div>';
    
    try {
      const env = await loadEnv();
      const accounts = env.finance?.investment_accounts || {};
      
      if (Object.keys(accounts).length === 0) {
        list.innerHTML = `
          <div class="card soft" style="text-align:center; padding:48px">
            <div style="font-size:48px; margin-bottom:16px">📈</div>
            <div style="color:var(--muted)">No investment accounts have been opened yet.</div>
          </div>
        `;
        return;
      }

      list.innerHTML = Object.entries(accounts).map(([id, account]) => `
        <div class="card soft">
          <div style="display:flex; justify-content:space-between; margin-bottom:16px">
            <div>
              <h3 style="margin:0 0 4px 0">${account.name || ''} (#${id})</h3>
              <div style="color:var(--muted); font-size:14px">Details: ${account.type || ''}</div>
            </div>
            <div style="text-align:right">
              <div style="font-weight:600">Balance: ¥${account.balance ? parseFloat(account.balance).toFixed(2) : '0.00'}</div>
              <div style="color:var(--muted); font-size:13px">Status: <span class="badge ${account.status === 'active' ? 'ok' : 'warn'}">${account.status === 'active' ? 'Active' : ''}</span></div>
            </div>
          </div>
          
          <div style="display:flex; gap:8px">
            <button class="btn" id="view-investment-${id}" onclick="viewPortfolio('${id}')">View Portfolio</button>
            <button class="btn secondary" id="close-investment-${id}" onclick="closeAccount('${id}')">Close Account</button>
          </div>
        </div>
      `).join('');
      
    } catch (e) {
      console.error(e);
      list.innerHTML = '<div class="error">Load failed</div>';
    }
  }

  function openOpenAccountModal() {
    new Modal({
      title: 'Open Investment Account',
      content: `
        <div class="form">
          <label>Account Name</label>
          <input id="new-name" class="input" placeholder="e.g. Retirement Fund, US Stocks">
          
          <label>Account Type</label>
          <select id="new-type" class="input">
            <option value="stocks">Stocks</option>
            <option value="funds">Funds</option>
            <option value="retirement">Retirement</option>
          </select>

          <label>Initial Deposit</label>
          <input id="initial-deposit" type="number" class="input" placeholder="e.g. 1000">
        </div>
      `,
      confirmText: 'Open Account',
      onConfirm: async () => {
        const name = document.getElementById('new-name').value;
        const type = document.getElementById('new-type').value;
        const initialDeposit = document.getElementById('initial-deposit').value;
        
        if (!name || !initialDeposit) {
          Toast.error("Enter the account name and initial deposit.");
          return;
        }
        
        await send(investmentTaskId, 'manage_investment_account', {
          action_type: 'open',
          name: name,
          type: type,
          initial_deposit: parseFloat(initialDeposit)
        });
        await loadInvestmentAccounts();
      }
    }).open();
  }

  function viewPortfolio(id) {
    Toast.info(`Viewing portfolio ${id}.`);
  }

  function closeAccount(id) {
    new Modal({
      title: 'Confirm',
      content: ` ${id} ？`,
      confirmText: 'Confirm',
      onConfirm: async () => {
        await send(investmentTaskId, 'manage_investment_account', {
          action_type: 'close',
          account_id: id
        });
        await loadInvestmentAccounts();
      }
    }).open();
  }

  document.addEventListener('DOMContentLoaded', loadInvestmentAccounts);
  </script>
