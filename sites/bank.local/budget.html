<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Management - Nebula Bank</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: #333; }
        .container { background-color: #ffffff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); text-align: center; max-width: 640px; width: 90%; margin-top: 50px; }
        h1 { color: #2c3e50; margin-bottom: 25px; font-size: 2.2em; }
        .budget-list { list-style: none; padding: 0; text-align: left; }
        .budget-item { background-color: #f8f9fa; margin-bottom: 15px; padding: 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #007bff; }
        .budget-info h3 { margin: 0 0 5px 0; font-size: 1.2em; color: #333; }
        .budget-info p { margin: 0; color: #666; font-size: 0.95em; }
        .budget-limit { font-weight: bold; color: #2c3e50; background: none; border: none; padding: 0; cursor: pointer; font-size: 1em; }
        .btn-edit { background-color: #ffc107; color: #333; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-size: 0.9em; transition: background-color 0.2s; }
        .btn-edit:hover { background-color: #e0a800; }
        .btn-cancel { background-color: #6c757d; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-save { background-color: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .message { margin-top: 20px; font-weight: bold; }
        .success { color: #28a745; }
        .hint { color: #64748b; font-size: 13px; margin-top: 8px; }
        .modal-overlay { position: fixed; inset: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 90%; max-width: 400px; position: relative; }
        .modal-header h2 { margin-top: 0; color: #2c3e50; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    </style>
    <script>window.RelRoot = "../";</script>
    <script src="../static/common.js"></script>
</head>
<body>
    <div class="container">
        <h1>Monthly Budget</h1>
        <ul class="budget-list">
            <li class="budget-item" data-category="food">
                <div class="budget-info">
                    <h3>Food & Dining</h3>
                    <p>Limit: <button type="button" class="budget-limit" id="limit-food" onclick="handleLimitClick('food')">$500.00</button></p>
                </div>
                <button id="edit-food-btn" class="btn-edit" onclick="handleEditClick('food', 500)">Edit Limit</button>
            </li>
            <li class="budget-item" data-category="transport">
                <div class="budget-info">
                    <h3>Transportation</h3>
                    <p>Limit: <button type="button" class="budget-limit" id="limit-transport" onclick="handleLimitClick('transport')">$200.00</button></p>
                </div>
                <button id="edit-transport-btn" class="btn-edit" onclick="handleEditClick('transport', 200)">Edit Limit</button>
            </li>
            <li class="budget-item" data-category="utilities">
                <div class="budget-info">
                    <h3>Utilities</h3>
                    <p>Limit: <button type="button" class="budget-limit" id="limit-utilities" onclick="handleLimitClick('utilities')">$300.00</button></p>
                </div>
                <button id="edit-utilities-btn" class="btn-edit" onclick="handleEditClick('utilities', 300)">Edit Limit</button>
            </li>
            <li class="budget-item" data-category="groceries">
                <div class="budget-info">
                    <h3>Groceries</h3>
                    <p>Limit: <button type="button" class="budget-limit" id="limit-groceries" onclick="handleLimitClick('groceries')">$400.00</button></p>
                </div>
                <button id="edit-groceries-btn" class="btn-edit" onclick="handleEditClick('groceries', 400)">Edit Limit</button>
            </li>
        </ul>

        <p class="message" id="status-message"></p>
    </div>

    <div id="edit-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Edit Budget</h2>
            </div>
            <div class="form-group">
                <label for="new-limit">New Limit ($)</label>
                <input type="number" id="new-limit" min="0" step="10">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
                <button class="btn-save" onclick="saveBudget()">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        const budgetParams = new URLSearchParams(window.location.search);
        const requestedBudgetTaskId = budgetParams.get('task') || 'D2-2025-BUDGET';

        let currentCategory = '';

        function getBudgetTaskId() {
            return resolveTaskId(requestedBudgetTaskId);
        }

        function ensureBudgetCategory(category, limit) {
            if (!category || document.getElementById(`limit-${category}`)) return;
            const list = document.querySelector('.budget-list');
            if (!list) return;
            const title = category.replace(/_/g, ' ').replace(/\b\w/g, (ch) => ch.toUpperCase());
            const parsedLimit = Number(limit);
            const safeLimit = Number.isFinite(parsedLimit) ? parsedLimit : 0;
            const item = document.createElement('li');
            item.className = 'budget-item';
            item.setAttribute('data-category', category);
            item.innerHTML = `
                <div class="budget-info">
                    <h3>${title}</h3>
                    <p>Limit: <button type="button" class="budget-limit" id="limit-${category}" onclick="handleLimitClick('${category}')">$${safeLimit.toFixed(2)}</button></p>
                </div>
                <button id="edit-${category}-btn" class="btn-edit" onclick="handleEditClick('${category}', ${safeLimit})">Edit Limit</button>
            `;
            list.appendChild(item);
        }

        function limitText(category) {
            const raw = document.getElementById(`limit-${category}`).textContent;
            const parsed = parseFloat(String(raw).replace(/[^0-9.]/g, ''));
            return Number.isFinite(parsed) ? parsed : 0;
        }

        function openEditModal(category, currentLimit) {
            currentCategory = category;
            document.getElementById('modal-title').textContent = `Edit ${category.charAt(0).toUpperCase() + category.slice(1)} Budget`;
            document.getElementById('new-limit').value = currentLimit;
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('edit-modal').style.display = 'none';
        }

        function handleEditClick(category, currentLimit) {
            openEditModal(category, limitText(category));
        }

        function handleLimitClick(category) {
            openEditModal(category, limitText(category));
        }

        async function applyBudgetUpdate(category, limit) {
            currentCategory = category;
            await send(getBudgetTaskId(), 'adjust_budget', {
                category: category,
                limit: Number(limit)
            });
        }

        async function saveBudget() {
            const rawLimit = parseFloat(document.getElementById('new-limit').value);
            if (isNaN(rawLimit) || rawLimit < 0) {
                alert('Please enter a valid amount.');
                return;
            }

            closeEditModal();
            await applyBudgetUpdate(currentCategory, rawLimit);
        }

        async function loadBudgets() {
            const env = await loadEnv();
            const budgets = env?.finance?.budgets || {};

            for (const [cat, data] of Object.entries(budgets)) {
                ensureBudgetCategory(cat, data.limit);
                const el = document.getElementById(`limit-${cat}`);
                if (el) {
                    el.textContent = `$${parseFloat(data.limit).toFixed(2)}`;
                }
            }

            const status = document.getElementById('status-message');
            if (status && budgetParams.get('updated') === 'true') {
                status.textContent = 'Budget updated successfully.';
                status.className = 'message success';
            }
        }

        loadBudgets();
    </script>
</body>
</html>
