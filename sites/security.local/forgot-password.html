<!doctype html>
<html lang="en">
<head>
<script>window.RelRoot = "../";</script>
  <meta charset="utf-8">
  <title>Security.local - Account Recovery</title>
  <link rel="stylesheet" href="../static/skin.css">
  <link rel="stylesheet" href="../static/components.css">
  <script src="../static/common.js"></script>
  <script src="../static/components.js"></script>
</head>
<body class="page" style="display:flex; align-items:center; justify-content:center; min-height:100vh">
  
  <div class="card soft" style="width:400px">
    <h1 style="text-align:center">Request Verification Code</h1>
    <p id="recovery-hint" style="text-align:center; color:var(--muted); margin-bottom:20px">Use the account username or email to continue the recovery flow.</p>
    
    <div class="form">
        <label>Username or Email</label>
        <input id="username" class="input" autocomplete="username" placeholder="Enter the account username or email">

        <button id="request-reset-code-btn" class="btn pri" style="width:100%; margin-top:24px" onclick="requestCode()">Send Verification Code</button>
        <div style="text-align:center; margin-top:16px">
            <a id="back-to-login-link" href="login.html" style="color:var(--pri)">Back to Login</a>
        </div>
    </div>
  </div>

  <script>
  const recoveryParams = new URLSearchParams(window.location.search);
  const requestedRecoveryTaskId = recoveryParams.get('task') || 'Z5-2025-RESET';
  const recoveryTaskId = resolveTaskId(requestedRecoveryTaskId);
  function withTaskParam(url) {
      if (!url || !recoveryTaskId) return url;
      const parsed = new URL(url, window.location.href);
      parsed.searchParams.set('task', recoveryTaskId);
      return parsed.pathname + parsed.search + parsed.hash;
  }

  async function requestCode() {
      const username = document.getElementById('username').value;
      if (!username) {
          Toast.error("Enter the username or email tied to the account.");
          return;
      }
      
      const resp = await send(recoveryTaskId, 'request_reset_code', {
          username: username
      });
      
      if (resp && resp.redirect) {
          window.location.href = withTaskParam(resp.redirect);
      }
  }

  document.addEventListener('DOMContentLoaded', () => {
      const backToLoginLink = document.getElementById('back-to-login-link');
      if (backToLoginLink) {
          backToLoginLink.href = withTaskParam('login.html');
      }
  });
  </script>
