<!doctype html>
<html lang="en">
<head>
<script>window.RelRoot = "../";</script>
  <meta charset="utf-8">
  <title>Security.local - Reset Password</title>
  <link rel="stylesheet" href="../static/skin.css">
  <link rel="stylesheet" href="../static/components.css">
  <script src="../static/common.js"></script>
  <script src="../static/components.js"></script>
</head>
<body class="page" style="display:flex; align-items:center; justify-content:center; min-height:100vh">
  
  <div class="card soft" style="width:400px">
    <h1 style="text-align:center">Reset Password</h1>
    <p id="reset-hint" style="text-align:center; color:var(--muted); margin-bottom:20px">Enter the verification code and choose a new password.</p>
    
    <div class="form">
        <label>Verification Code</label>
        <input id="code" class="input" placeholder="Verification Code">
        
        <label>New Password</label>
        <input id="new-password" type="password" class="input" autocomplete="new-password" placeholder="Choose a secure password">

        <button id="submit-reset-password-btn" class="btn pri" style="width:100%; margin-top:24px" onclick="doReset()">Reset Password</button>
    </div>
  </div>

  <script>
  const resetParams = new URLSearchParams(window.location.search);
  const requestedResetTaskId = resetParams.get('task') || 'Z5-2025-RESET';
  const resetTaskId = resolveTaskId(requestedResetTaskId);

  function withTaskParam(url) {
      if (!url || !resetTaskId) return url;
      const parsed = new URL(url, window.location.href);
      parsed.searchParams.set('task', resetTaskId);
      return parsed.pathname + parsed.search + parsed.hash;
  }

  async function doReset() {
      const code = document.getElementById('code').value;
      const newPass = document.getElementById('new-password').value;
      
      if (!code || !newPass) {
          Toast.error("Enter the verification code and a new password.");
          return;
      }
      
      const resp = await send(resetTaskId, 'reset_password', {
          code: code,
          new_password: newPass
      });
      
      if (resp && resp.redirect) {
          window.location.href = withTaskParam(resp.redirect);
      } else if (resp && resp.error) {
          Toast.error(resp.error);
      }
  }
  </script>
