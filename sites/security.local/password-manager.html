<!doctype html>
<html lang="en">
<head>
<script>window.RelRoot = "../";</script>
  <meta charset="utf-8">
  <title>Security.local - Password Manager</title>
  <link rel="stylesheet" href="../static/skin.css">
  <link rel="stylesheet" href="../static/components.css">
  <script src="../static/common.js"></script>
  <script src="../static/components.js"></script>
</head>
<body class="page">
  <div class="navbar">
    <div class="inner">
      <div class="brand">🔒 Security.local</div>
      <div class="navlinks">
        <a href="../security.local/dashboard.html">Dashboard</a>
        <a href="../security.local/password-manager.html" class="active">Passwords</a>
        <a href="../security.local/2fa.html">Two-Factor Auth</a>
      </div>
    </div>
  </div>
  
  <div class="container" style="max-width:800px">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px">
      <h1>Password</h1>
      <button id="open-add-password-btn" class="btn pri" onclick="openAddPasswordModal()">Add Credential</button>
    </div>

    <div class="card soft" style="margin-bottom:24px">
        <h2>Password Strength Overview</h2>
        <div id="password-strength-overview">
            <div class="loading">Loading......</div>
        </div>
    </div>

    <h2>Saved Credentials</h2>
    <div id="password-list" style="display:flex; flex-direction:column; gap:16px">
      <!-- Passwords loaded here -->
    </div>
  </div>

  <script>
  const passwordManagerParams = new URLSearchParams(window.location.search);
  const requestedPasswordTaskId = passwordManagerParams.get('task') || 'L1-2025-PASSMGR';
  const passwordTaskId = resolveTaskId(requestedPasswordTaskId);

  async function loadPassword() {
    const list = document.getElementById('password-list');
    list.innerHTML = '<div class="loading">Loading......</div>';
    
    try {
      const env = await loadEnv();
      const passwords = env.security?.passwords || {};
      
      let weak = 0;
      let medium = 0;
      let strong = 0;

      if (Object.keys(passwords).length === 0) {
        list.innerHTML = `
          <div class="card soft" style="text-align:center; padding:48px">
            <div style="font-size:48px; margin-bottom:16px">🔑</div>
            <div style="color:var(--muted)">No saved credentials yet.</div>
          </div>
        `;
      } else {
        list.innerHTML = Object.entries(passwords).map(([id, pw]) => {
            const strength = getPasswordStrength(pw.password);
            if (strength === '') weak++;
            else if (strength === '') medium++;
            else strong++;

            return `
              <div class="card soft">
                <div style="display:flex; justify-content:space-between; margin-bottom:8px">
                  <div>
                    <h3 style="margin:0 0 4px 0">${pw.site}</h3>
                    <div style="color:var(--muted); font-size:14px">Username: ${pw.username}</div>
                  </div>
                  <div style="text-align:right">
                    <div style="font-weight:600">Strength: <span class="badge ${strength === 'Strong' ? 'ok' : (strength === 'Weak' ? 'error' : 'warn')}">${strength}</span></div>
                    <div style="color:var(--muted); font-size:13px">Updated: ${pw.last_updated || 'N/A'}</div>
                  </div>
                </div>
                <div style="display:flex; gap:8px">
                  <button id="copy-password-${id}" class="btn" onclick="copyPassword('${id}')">Copy Password</button>
                  <button id="delete-password-${id}" class="btn secondary" onclick="deletePassword('${id}')">Delete Credential</button>
                </div>
              </div>
            `;
        }).join('');
      }

      document.getElementById('password-strength-overview').innerHTML = `
        <div style="display:flex; justify-content:space-around; text-align:center">
          <div>Weak: <span class="badge error">${weak}</span></div>
          <div>Medium: <span class="badge warn">${medium}</span></div>
          <div>Strong: <span class="badge ok">${strong}</span></div>
        </div>
      `;
      
    } catch (e) {
      console.error(e);
      list.innerHTML = '<div class="error">Load failed</div>';
    }
  }

  function getPasswordStrength(password) {
    if (!password) return 'Weak';
    let score = 0;
    if (password.length > 8) score++;
    if (/[A-Z]/.test(password)) score++;
    if (/[a-z]/.test(password)) score++;
    if (/[0-9]/.test(password)) score++;
    if (/[^A-Za-z0-9]/.test(password)) score++;
    
    if (score < 3) return 'Weak';
    if (score < 5) return 'Medium';
    return 'Strong';
  }

  function openAddPasswordModal() {
    new Modal({
      title: 'Add Password',
      content: `
        <div class="form">
          <label>Site</label>
          <input id="site-name" class="input" placeholder="e.g. SocialHub">
          
          <label>Username/Email</label>
          <input id="username-input" class="input" placeholder="e.g. privacy_user">
          
          <label>Password</label>
          <input id="password-input" type="password" class="input" placeholder="Enter a strong password">
        </div>
      `,
      confirmText: 'Save Credential',
      onConfirm: async () => {
        const site = document.getElementById('site-name').value;
        const username = document.getElementById('username-input').value;
        const password = document.getElementById('password-input').value;
        
        if (!site || !username || !password) {
          Toast.error("Enter site, username, and password.");
          return;
        }
        
        await send(passwordTaskId, 'manage_password', {
          action_type: 'add',
          site: site,
          username: username,
          password: password
        });
        
        setTimeout(loadPassword, 500);
      }
    }).open();
  }

  function copyPassword(id) {
    Toast.info(`Credential ${id} copied to the secure clipboard queue.`);
  }

  function deletePassword(id) {
    new Modal({
      title: 'Delete Credential',
      content: `Delete credential ${id}?`,
      confirmText: 'Delete Credential',
      onConfirm: async () => {
        await send(passwordTaskId, 'manage_password', {
          action_type: 'delete',
          password_id: id
        });
        setTimeout(loadPassword, 500);
      }
    }).open();
  }

  document.addEventListener('DOMContentLoaded', loadPassword);
  </script>
