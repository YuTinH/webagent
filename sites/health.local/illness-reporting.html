<!doctype html>
<html lang="en">
<head>
<script>window.RelRoot = "../";</script>
  <meta charset="utf-8">
  <title>health.local - /</title>
  <link rel="stylesheet" href="../static/skin.css">
  <link rel="stylesheet" href="../static/components.css">
  <script src="../static/common.js"></script>
  <script src="../static/components.js"></script>
</head>
<body class="page">
  <div class="navbar">
    <div class="inner">
      <div class="brand">⚕️ Health.local</div>
      <div class="navlinks">
        <a href="../health.local/index.html">Home</a>
        <a href="../health.local/appointments.html">Appointment</a>
        <a href="../health.local/insurance.html">Insurance</a>
        <a href="../health.local/illness-reporting.html" class="active">Information</a>
      </div>
    </div>
  </div>
  
  <div class="container" style="max-width:800px">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px">
      <h1>/</h1>
      <button class="btn pri" onclick="openReportModal()">+ Submit</button>
    </div>

    <div id="reports-list" style="display:flex; flex-direction:column; gap:16px">
      <!-- Reports loaded here -->
    </div>
  </div>

  <script>
  async function loadReports() {
    const list = document.getElementById('reports-list');
    list.innerHTML = '<div class="loading">Loading......</div>';
    
    try {
      const env = await loadEnv();
      const reports = env.health?.illness_reports || {};
      
      if (Object.keys(reports).length === 0) {
        list.innerHTML = `
          <div class="card soft" style="text-align:center; padding:48px">
            <div style="font-size:48px; margin-bottom:16px">😷</div>
            <div style="color:var(--muted)">/</div>
          </div>
        `;
        return;
      }

      list.innerHTML = Object.entries(reports).map(([id, report]) => `
        <div class="card soft">
          <div style="display:flex; justify-content:space-between; margin-bottom:8px">
            <div>
              <h3 style="margin:0 0 4px 0">${report.type === 'illness' ? 'Illness Report' : 'Isolation Report'} (#${id})</h3>
              <div style="color:var(--muted); font-size:14px">Details: ${report.reason}</div>
            </div>
            <div style="text-align:right">
              <div style="font-weight:600">Status: <span class="badge ${report.status === 'resolved' ? 'ok' : 'warn'}">${report.status}</span></div>
              <div style="color:var(--muted); font-size:13px">Until: ${report.end_date || 'Open'}</div>
            </div>
          </div>
          
          <div style="display:flex; gap:8px">
            <button class="btn" onclick="viewDetails('${id}')">Details</button>
            <button class="btn secondary" onclick="requestAssistance('${id}')">Information</button>
          </div>
        </div>
      `).join('');
      
    } catch (e) {
      console.error(e);
      list.innerHTML = '<div class="error">Load failed</div>';
    }
  }

  function openReportModal() {
    new Modal({
      title: 'Submit',
      content: `
        <div class="form">
          <label>Information</label>
          <select id="report-type" class="input">
            <option value="illness">Information</option>
            <option value="isolation">Information</option>
          </select>
          
          <label>Information</label>
          <input id="report-reason" class="input" placeholder="Details: , ">
          
          <label>/Date ()</label>
          <input id="end-date" type="date" class="input">
        </div>
      `,
      confirmText: 'Submit',
      onConfirm: async () => {
        const type = document.getElementById('report-type').value;
        const reason = document.getElementById('report-reason').value;
        const endDate = document.getElementById('end-date').value;
        
        if (!type || !reason) {
          Toast.error("");
          return;
        }
        
        await send(resolveTaskId('M3-2025-ILLNESS'), 'submit_illness_report', {
          type: type,
          reason: reason,
          end_date: endDate || null
        });
        
        setTimeout(loadReports, 500);
      }
    }).open();
  }

  function viewDetails(id) {
    Toast.info(` ${id} Details ()`);
  }

  function requestAssistance(id) {
    new Modal({
      title: '',
      content: ` ${id} ？：Cancel，Insurance。`,
      confirmText: 'Confirm',
      onConfirm: async () => {
        Toast.info('Submit！');
        // In a real app, this would trigger backend processes for assistance.
      }
    }).open();
  }

  document.addEventListener('DOMContentLoaded', loadReports);
  </script>
