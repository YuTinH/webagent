<!doctype html>
<html lang="en">
<head>
<script>window.RelRoot = "../";</script>
  <meta charset="utf-8">
  <title>health.local - InsurancePurchase</title>
  <link rel="stylesheet" href="../static/skin.css">
  <link rel="stylesheet" href="../static/components.css">
  <script src="../static/common.js"></script>
  <script src="../static/components.js"></script>
</head>
<body class="page">
  <div class="navbar">
    <div class="inner">
      <div class="brand">⚕️ Health.local</div>
      <div class="navlinks">
        <a href="../health.local/index.html">Home</a>
        <a href="../health.local/appointments.html">Appointment</a>
        <a href="../health.local/records.html">Information</a>
        <a href="../health.local/insurance.html" class="active">Insurance</a>
      </div>
    </div>
  </div>
  
  <div class="container" style="max-width:800px">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px">
      <h1>Insurance Purchase</h1>
    </div>

    <div class="card soft" style="margin-bottom:24px">
        <h2>Current Insurance Status</h2>
        <div id="current-policy">
            <div class="loading">Loading......</div>
        </div>
    </div>

    <h2>Available Insurance Plans</h2>
    <div id="insurance-plans-list" style="display:grid; grid-template-columns:1fr 1fr; gap:16px">
      <!-- Plans loaded here -->
    </div>
  </div>

  <script>
  const insurancePageParams = new URLSearchParams(window.location.search);
  const requestedInsuranceTaskId = insurancePageParams.get('task') || 'G2-2025-INSURANCE';
  const insuranceTaskId = resolveTaskId(requestedInsuranceTaskId);

  function planCatalog() {
    return [
      {
        id: 'PLAN-A',
        domId: 'plan-basic',
        buttonId: 'purchase-plan-basic-btn',
        name: 'Basic Care Plan',
        provider: 'Nova Health',
        price: 500,
        benefits: ['Annual checkup', 'Telehealth support', 'General outpatient coverage'],
        waiting_period: '30 days'
      },
      {
        id: 'PLAN-B',
        domId: 'plan-premium-plus',
        buttonId: 'purchase-plan-premium-plus-btn',
        name: 'Premium Plus Plan',
        provider: 'Prime Shield',
        price: 200,
        benefits: ['Specialist visits', 'Dental support', 'Priority claims'],
        waiting_period: '14 days'
      },
      {
        id: 'PLAN-C',
        domId: 'plan-family-flex',
        buttonId: 'purchase-plan-family-flex-btn',
        name: 'Family Flex Plan',
        provider: 'Harbor Mutual',
        price: 320,
        benefits: ['Family outpatient coverage', 'Emergency care', 'Prescription support'],
        waiting_period: '21 days'
      }
    ];
  }

  function markActiveInsuranceCard(planName) {
    document.querySelectorAll('#insurance-plans-list .card.soft').forEach(card => {
      card.style.border = '1px solid var(--border)';
    });
    const active = Array.from(document.querySelectorAll('#insurance-plans-list .card.soft')).find(card =>
      card.getAttribute('data-plan-name') === planName
    );
    if (active) {
      active.style.border = '2px solid var(--ok)';
    }
  }

  function renderCurrentPolicy(current) {
    const currentPolicyDiv = document.getElementById('current-policy');
    if (current && current.active) {
      currentPolicyDiv.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center">
            <div>
                <div style="font-size:18px; font-weight:600">${current.provider || 'Insurance'} - ${current.plan_name || ''}</div>
                <div style="color:var(--muted); font-size:14px">Policy Number: ${current.policy_number || 'N/A'}</div>
            </div>
            <span class="badge ok">Active</span>
        </div>
        <div style="margin-top:12px; font-size:14px">
            <div>Expiry Date: ${current.expiry_date || ''}</div>
        </div>
      `;
      markActiveInsuranceCard(current.plan_name || '');
      return;
    }
    currentPolicyDiv.innerHTML = `<div style="color:var(--muted)">No active insurance policy.</div>`;
  }

  async function loadInsurance() {
    const plansList = document.getElementById('insurance-plans-list');
    
    try {
      const env = await loadEnv();
      const current = env.health?.insurance || {};
      renderCurrentPolicy(current);

      const plans = planCatalog();
      plansList.innerHTML = plans.map(plan => `
        <div class="card soft" id="${plan.domId}" data-plan-name="${plan.name}" style="border:1px solid var(--border)">
          <h3 style="margin:0 0 8px 0">${plan.name}</h3>
          <div style="color:var(--pri); font-weight:700; font-size:18px; margin-bottom:8px">¥${plan.price} / month</div>
          <div style="font-size:13px; color:var(--muted); margin-bottom:4px">Provider: ${plan.provider}</div>
          <div style="font-size:13px; color:var(--muted); margin-bottom:12px">Waiting Period: ${plan.waiting_period}</div>
          <ul style="font-size:13px; padding-left:20px; margin-bottom:16px">
            ${plan.benefits.map(b => `<li>${b}</li>`).join('')}
          </ul>
          <button class="btn pri" id="${plan.buttonId}" style="width:100%" onclick="purchaseInsurance('${plan.id}', '${plan.name}', '${plan.provider}')">Purchase Plan</button>
        </div>
      `).join('');
      
    } catch (e) {
      console.error(e);
    }
  }

  async function purchaseInsurance(planId, planName, provider) {
    await send(insuranceTaskId, 'purchase_insurance', {
      plan_id: planId,
      plan_name: planName,
      provider: provider
    });
    renderCurrentPolicy({
      active: true,
      plan_name: planName,
      provider: provider,
      policy_number: 'POL-PENDING',
      expiry_date: 'Pending'
    });
  }

  document.addEventListener('DOMContentLoaded', loadInsurance);
  </script>
