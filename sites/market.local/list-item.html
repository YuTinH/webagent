<!doctype html>
<html lang="en">
<head>
<script>window.RelRoot = "../";</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> - Nebula</title>
<link rel="stylesheet" href="../static/skin.css">
<link rel="stylesheet" href="../static/components.css">
<style>
.form-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  max-width: 600px;
  margin: 0 auto;
}
.form-group {
  margin-bottom: 20px;
}
.form-group label {
  display: block;
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 8px;
}
.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  color: var(--text);
  font-size: 15px;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none;
  border-color: var(--pri);
  box-shadow: 0 0 0 2px rgba(79,70,229,0.2);
}
</style>
</head>
<body>

<!-- Navigation -->
<div class="navbar">
  <div class="inner">
    <div class="brand">
      <div class="logo"></div>
      Nebula
    </div>
    <div class="navlinks">
      <a href="../social.local/index.html">Home</a>
      <a href="../market.local/index.html">Marketplace</a>
      <a href="../market.local/my-listings.html">My Listings</a>
    </div>
  </div>
</div>

<div id="__toast" class="toast"></div>

<!-- Main Container -->
<div class="container">

  <h1 style="text-align:center; font-size:28px; font-weight:700; margin:32px 0">Create Marketplace Listing</h1>

  <div class="form-card">
    <div class="form-group">
      <label for="item-name">Item Name</label>
      <input type="text" id="item-name" placeholder="e.g. Vintage desk lamp">
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" rows="4" placeholder="Condition, pickup details, included accessories..."></textarea>
    </div>
    <div class="form-group">
      <label for="price">Price (¥)</label>
      <input type="number" id="price" placeholder="：200">
    </div>
    <div class="form-group">
      <label for="category">Category</label>
      <select id="category">
        <option value="home">Home</option>
        <option value="service">Service</option>
        <option value="electronics">Electronics</option>
        <option value="furniture">Furniture</option>
        <option value="books">Books</option>
        <option value="sports">Sports</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="form-group">
      <label for="photo-upload">Photo Upload (optional)</label>
      <input type="file" id="photo-upload">
    </div>
    <button id="submit-market-listing-btn" class="btn pri lg" style="width:100%" onclick="submitListing()">Publish Listing</button>
  </div>

  <div class="footer">Nebula · Synthetic UI for Web Agent Research</div>
</div>

<!-- JavaScript -->
<script src="../static/common.js"></script>
<script src="../static/components.js"></script>
<script>
const listingParams = new URLSearchParams(window.location.search);
const requestedListingTaskId = listingParams.get('task') || 'B6-2025-MARKET';
const listingTaskId = resolveTaskId(requestedListingTaskId);

async function submitListing() {
  const itemName = document.getElementById('item-name').value;
  const description = document.getElementById('description').value;
  const price = document.getElementById('price').value;
  const category = document.getElementById('category').value;
  const photoInput = document.getElementById('photo-upload');
  const photoName = photoInput.files.length > 0 ? photoInput.files[0].name : '';

  if (!itemName || !price || !category) {
    Toast.error('Enter the listing name, price, and category.');
    return;
  }

  Toast.info('Submitting listing...');

  try {
    const response = await send(listingTaskId, 'list_second_hand_item', {
      name: itemName,
      description: description,
      price: parseFloat(price),
      category: category,
      photo_name: photoName
    });

    if (response && (response.success || response.redirect)) {
      Toast.success('!');
      // Fallback reload if redirect doesn't happen automatically
      if (!response.redirect) {
          window.location.href = `${window.RelRoot}market.local/index.html?listed=true&task=${encodeURIComponent(listingTaskId)}`;
      }
    } else {
        console.warn('Response invalid, attempting fallback redirect...');
        window.location.href = `${window.RelRoot}market.local/index.html?listed=true&task=${encodeURIComponent(listingTaskId)}`;
    }
  } catch (error) {
    console.error('Details:', error);
    if (error.message.includes('Network Error')) {
        console.warn('Network error detected, attempting fallback redirect...');
        window.location.href = `${window.RelRoot}market.local/index.html?listed=true&task=${encodeURIComponent(listingTaskId)}`;
    } else {
        Toast.error('Error, please try again.');
    }
  }
}

document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    if (params.get('listed') === 'true') {
        Toast.success('!');
    }
});
</script>

<!-- Distractor: Chat Widget -->
<div class="chat-widget" onclick="Toast.info('Chat support busy. Please try later.')">
  <span style="font-size:24px">💬</span>
</div>
